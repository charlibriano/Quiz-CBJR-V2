<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modo Quiz - Charlie Brown Jr.</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1JCN94Y3P0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-1JCN94Y3P0');
  </script>

  <style>
    @font-face {
      font-family: 'Elektrix';
      src: url('https://raw.githubusercontent.com/charlibriano/Quiz-CBJR-V2/main/Elektrix-Bold.woff2') format('woff2'),
           url('https://raw.githubusercontent.com/charlibriano/Quiz-CBJR-V2/main/Elektrix-Bold.woff') format('woff'),
           url('https://cdn.jsdelivr.net/gh/charlibriano/Quiz-CBJR-V2/Elektrix%20Bold.ttf') format('truetype');
      font-weight: bold;
      font-display: swap;
    }

    :root {
      --yellow: #f1c40f;
      --green: #1ed760;
      --red: #ff3b30;
      --white: #f8f8f8;
      --black: #020202;
      --ink: #111;
      --muted: rgba(255,255,255,.72);
      --line: rgba(241,196,15,.34);
      --glass: rgba(0,0,0,.62);
      --shadow: 0 20px 70px rgba(0,0,0,.68);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
      background-color: #000;
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
    }

    body.tela-dificuldade {
      background-image:
        linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.25)),
        url('quiz-bg.jpg');
    }

    body.tela-pergunta {
      background-image:
        linear-gradient(90deg, rgba(0,0,0,.02), rgba(0,0,0,.03)),
        url('quiz-pergunta.jpg');
      background-position: center center;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(circle at 50% 0%, rgba(241,196,15,.06), transparent 34%),
        linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.08));
    }

    button {
      font-family: inherit;
    }

    .topbar {
      position: fixed;
      top: 18px;
      left: 18px;
      right: 18px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .topbar-left,
    .topbar-center,
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }

    .menu-btn,
    .power-btn,
    .ghost-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(0,0,0,.72);
      color: #fff;
      min-height: 42px;
      padding: 0 18px;
      font-weight: 950;
      letter-spacing: .02em;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 18px rgba(241,196,15,.18), inset 0 1px 0 rgba(255,255,255,.08);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease, opacity .2s ease;
    }

    .menu-btn:hover,
    .power-btn:hover,
    .ghost-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(241,196,15,.8);
      box-shadow: 0 0 26px rgba(241,196,15,.32), inset 0 1px 0 rgba(255,255,255,.12);
    }

    .power-btn:disabled {
      opacity: .38;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .mode-pill {
      border: 1px solid rgba(241,196,15,.28);
      border-radius: 999px;
      background: rgba(0,0,0,.68);
      padding: 9px 15px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--yellow);
      font-family: 'Elektrix', Arial, sans-serif;
      letter-spacing: .06em;
      box-shadow: 0 0 18px rgba(30,215,96,.16);
      white-space: nowrap;
    }

    .mode-pill::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 16px var(--green);
    }

    .screen {
      position: relative;
      z-index: 5;
      min-height: 100svh;
      width: 100%;
      display: none;
    }

    .screen.active {
      display: block;
    }

    /* =========================
       TELA DE DIFICULDADE
       ========================= */
    .difficulty-screen {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 92px 28px 34px;
    }

    .difficulty-shell {
      width: min(1220px, 96vw);
      min-height: min(720px, 78svh);
      display: grid;
      grid-template-rows: auto 1fr;
      align-items: end;
      justify-items: center;
      border-radius: 26px;
      border: 1px solid rgba(241,196,15,.18);
      background: rgba(0,0,0,.06);
      box-shadow: inset 0 0 60px rgba(0,0,0,.35);
      padding: clamp(12px, 2vw, 26px);
    }

    .difficulty-title {
      text-align: center;
      max-width: 880px;
      margin-top: clamp(70px, 15vh, 160px);
      align-self: start;
    }

    .difficulty-title small {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--white);
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.62);
      border-radius: 999px;
      padding: 8px 14px;
      letter-spacing: .16em;
      text-transform: uppercase;
      font-weight: 900;
      font-size: .74rem;
    }

    .difficulty-title small::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 14px var(--green);
    }

    .difficulty-title h1 {
      margin: 20px 0 10px;
      font-family: 'Elektrix', Arial, sans-serif;
      color: var(--yellow);
      font-size: clamp(3.2rem, 8vw, 7.2rem);
      line-height: .78;
      text-shadow: 0 0 18px rgba(241,196,15,.72), 5px 6px 0 rgba(0,0,0,.74);
    }

    .difficulty-title p {
      margin: 0 auto;
      color: rgba(255,255,255,.82);
      max-width: 680px;
      line-height: 1.45;
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(0,0,0,.8);
    }

    .difficulty-actions {
      width: min(1080px, 94vw);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(14px, 2vw, 22px);
      align-self: end;
      margin-bottom: clamp(12px, 4vh, 50px);
    }

    .level-card {
      min-height: 116px;
      border-radius: 24px;
      border: 2px solid var(--accent);
      background: linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.72));
      color: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 0 26px color-mix(in srgb, var(--accent) 25%, transparent);
      transition: transform .22s ease, box-shadow .22s ease, background .22s ease;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      position: relative;
      overflow: hidden;
    }

    .level-card::before {
      content: "";
      position: absolute;
      left: 24px;
      top: 20px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent), 0 0 34px color-mix(in srgb, var(--accent) 55%, transparent);
    }

    .level-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 0 38px color-mix(in srgb, var(--accent) 46%, transparent);
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 14%, rgba(0,0,0,.10)), rgba(0,0,0,.76));
    }

    .level-card.is-pressed {
      transform: translateY(5px) scale(.98);
      filter: brightness(1.2);
    }

    .level-card strong {
      font-family: 'Elektrix', Arial, sans-serif;
      color: var(--accent);
      font-size: clamp(1.7rem, 3.1vw, 3.1rem);
      text-shadow: 0 0 18px color-mix(in srgb, var(--accent) 60%, transparent);
    }

    .level-card span {
      font-weight: 950;
      letter-spacing: .16em;
      font-size: .76rem;
      text-transform: uppercase;
    }

    .level-easy { --accent: #1ed760; }
    .level-normal { --accent: #f1c40f; }
    .level-hard { --accent: #ff3b30; }

    /* =========================
       TELA DE PERGUNTAS
       ========================= */
    .quiz-screen {
      min-height: 100svh;
      padding: 92px 22px 28px;
      display: grid;
      align-items: center;
    }

    .quiz-hud {
      position: fixed;
      top: 82px;
      left: 22px;
      right: 22px;
      z-index: 18;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      pointer-events: none;
    }

    .hud-card {
      border-radius: 17px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(0,0,0,.62);
      padding: 12px 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 12px 28px rgba(0,0,0,.3);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .hud-card small {
      display: block;
      color: rgba(255,255,255,.62);
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: .72rem;
      margin-bottom: 6px;
    }

    .hud-card strong {
      font-family: 'Elektrix', Arial, sans-serif;
      color: var(--yellow);
      font-size: 1.18rem;
      text-shadow: 0 0 12px rgba(241,196,15,.36);
    }

    .quiz-panel {
      position: relative;
      width: min(860px, 58vw);
      min-height: 610px;
      margin-left: clamp(360px, 34.5vw, 590px);
      margin-right: clamp(30px, 4vw, 72px);
      margin-top: clamp(26px, 5vh, 68px);
      padding: clamp(28px, 3vw, 46px) clamp(34px, 4vw, 62px);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: center;
      isolation: isolate;
    }

    .quiz-panel::before {
      content: "";
      position: absolute;
      inset: 8px;
      z-index: -1;
      border-radius: 8px;
      background: rgba(255,255,255,.10);
      pointer-events: none;
    }

    .quote-line {
      min-height: 24px;
      margin-bottom: 16px;
      color: rgba(0,0,0,.64);
      font-weight: 900;
      font-style: italic;
      font-size: clamp(.88rem, 1vw, 1rem);
      text-align: left;
    }

    .question-kicker {
      color: #d9a500;
      font-family: 'Elektrix', Arial, sans-serif;
      text-align: center;
      letter-spacing: .08em;
      font-size: clamp(1rem, 1.45vw, 1.35rem);
      text-shadow: 0 0 10px rgba(241,196,15,.18);
      margin-bottom: 12px;
    }

    .question-text {
      min-height: 124px;
      display: grid;
      place-items: center;
      color: #050505;
      text-align: center;
      font-family: 'Elektrix', Arial, sans-serif;
      font-size: clamp(2.05rem, 3.2vw, 3.85rem);
      line-height: 1.05;
      text-shadow: 0 2px 0 rgba(255,255,255,.28);
      letter-spacing: .015em;
      opacity: 0;
      transform: translateY(18px);
    }

    .question-text.show {
      animation: perguntaEntrada .72s ease forwards;
    }

    @keyframes perguntaEntrada {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .answers-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 13px;
      margin-top: 22px;
    }

    .answer-btn {
      min-height: 62px;
      border: 2px solid rgba(0,0,0,.82);
      border-radius: 17px;
      background: rgba(6,6,6,.92);
      color: #fff;
      text-align: left;
      display: grid;
      grid-template-columns: 48px 1fr;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      cursor: pointer;
      font-size: clamp(1rem, 1.45vw, 1.24rem);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 10px 20px rgba(0,0,0,.12);
      opacity: 0;
      transform: translateY(14px);
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .answer-btn.show {
      animation: respostaEntrada .44s ease forwards;
    }

    @keyframes respostaEntrada {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.01);
      border-color: var(--yellow);
      box-shadow: 0 0 18px rgba(241,196,15,.22), inset 0 1px 0 rgba(255,255,255,.1);
    }

    .answer-btn:disabled {
      cursor: not-allowed;
      opacity: .72;
    }

    .answer-letter {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid var(--yellow);
      color: var(--yellow);
      display: grid;
      place-items: center;
      font-weight: 950;
      font-size: 1.12rem;
      background: rgba(0,0,0,.7);
    }

    .answer-btn.correct {
      background: rgba(13, 120, 54, .94);
      border-color: var(--green);
      box-shadow: 0 0 24px rgba(30,215,96,.42);
    }

    .answer-btn.wrong {
      background: rgba(132, 24, 20, .94);
      border-color: var(--red);
      box-shadow: 0 0 24px rgba(255,59,48,.36);
    }

    .feedback-box {
      margin-top: 18px;
      border: 1px solid rgba(0,0,0,.14);
      background: rgba(0,0,0,.055);
      border-radius: 14px;
      padding: 13px 15px;
      color: #111;
      line-height: 1.42;
      font-weight: 700;
      display: none;
    }

    .feedback-box.show {
      display: block;
      animation: feedbackIn .3s ease both;
    }

    @keyframes feedbackIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .feedback-box strong {
      color: #000;
      display: block;
      margin-bottom: 5px;
      font-family: 'Elektrix', Arial, sans-serif;
      font-size: 1.08rem;
    }

    .next-row {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }

    .next-btn {
      border: 2px solid #000;
      border-radius: 999px;
      background: #000;
      color: #fff;
      min-height: 46px;
      padding: 0 24px;
      font-weight: 950;
      cursor: pointer;
      display: none;
    }

    .next-btn.show {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* =========================
       OVERLAYS / RESULTADOS
       ========================= */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(0,0,0,.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .overlay.show {
      display: grid;
      animation: overlayIn .28s ease both;
    }

    @keyframes overlayIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .overlay-card {
      width: min(680px, 94vw);
      border-radius: 28px;
      border: 1px solid rgba(241,196,15,.44);
      background:
        radial-gradient(circle at 50% 0%, rgba(241,196,15,.10), transparent 48%),
        rgba(0,0,0,.92);
      color: #fff;
      text-align: center;
      padding: clamp(26px, 4vw, 44px);
      box-shadow: 0 30px 90px rgba(0,0,0,.76), 0 0 44px rgba(241,196,15,.14);
    }

    .overlay-card h2 {
      margin: 0 0 14px;
      font-family: 'Elektrix', Arial, sans-serif;
      color: var(--yellow);
      font-size: clamp(2.1rem, 5.2vw, 4.5rem);
      line-height: .9;
      text-shadow: 0 0 18px rgba(241,196,15,.55);
    }

    .overlay-card p {
      margin: 0 0 18px;
      font-size: clamp(1rem, 1.7vw, 1.24rem);
      line-height: 1.5;
      color: rgba(255,255,255,.82);
      font-weight: 800;
    }

    .chorao-phrase {
      margin: 18px auto 22px;
      padding: 18px;
      border-left: 4px solid var(--yellow);
      border-right: 4px solid var(--yellow);
      color: #fff;
      font-family: 'Elektrix', Arial, sans-serif;
      font-size: clamp(1.2rem, 3vw, 2.3rem);
      line-height: 1.15;
      text-shadow: 0 0 16px rgba(255,255,255,.22), 0 0 22px rgba(241,196,15,.32);
    }

    .overlay-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .primary-btn,
    .secondary-btn {
      min-height: 52px;
      border-radius: 999px;
      padding: 0 28px;
      font-weight: 950;
      cursor: pointer;
      border: 2px solid var(--yellow);
      font-size: 1rem;
    }

    .primary-btn {
      background: var(--yellow);
      color: #000;
    }

    .secondary-btn {
      background: rgba(0,0,0,.55);
      color: #fff;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      z-index: 80;
      background: rgba(0,0,0,.86);
      color: #fff;
      border: 1px solid rgba(241,196,15,.42);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      box-shadow: 0 0 26px rgba(0,0,0,.45);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .loading,
    .error-state {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: var(--yellow);
      font-family: 'Elektrix', Arial, sans-serif;
      font-size: clamp(1.5rem, 4vw, 3rem);
      text-shadow: 0 0 18px rgba(241,196,15,.4);
    }

    /* =========================
       RESPONSIVO
       ========================= */
    @media (max-width: 1100px) {
      .quiz-hud {
        grid-template-columns: repeat(2, 1fr);
      }

      .quiz-panel {
        width: min(780px, 62vw);
        margin-left: 32vw;
        margin-right: 3vw;
        min-height: 560px;
      }

      .question-text {
        font-size: clamp(1.8rem, 3.1vw, 3.2rem);
      }
    }

    @media (max-width: 820px) {
      body.tela-pergunta {
        background-position: left center;
      }

      .topbar {
        top: 10px;
        left: 10px;
        right: 10px;
        gap: 8px;
      }

      .topbar-center {
        display: none;
      }

      .menu-btn,
      .power-btn {
        min-height: 38px;
        padding: 0 12px;
        font-size: .88rem;
      }

      .difficulty-screen {
        padding: 72px 12px 18px;
      }

      .difficulty-shell {
        min-height: 82svh;
        width: 100%;
        background: rgba(0,0,0,.18);
      }

      .difficulty-title {
        margin-top: 38px;
      }

      .difficulty-title h1 {
        font-size: clamp(2.7rem, 15vw, 5.2rem);
      }

      .difficulty-title p {
        font-size: .9rem;
      }

      .difficulty-actions {
        grid-template-columns: 1fr;
        width: min(390px, 90vw);
        gap: 10px;
        margin-bottom: 12px;
      }

      .level-card {
        min-height: 76px;
        border-radius: 18px;
        flex-direction: row;
        justify-content: space-between;
        padding: 0 22px 0 54px;
      }

      .level-card::before {
        left: 22px;
        top: 50%;
        transform: translateY(-50%);
      }

      .level-card strong {
        font-size: 1.55rem;
      }

      .level-card span {
        font-size: .62rem;
      }

      .quiz-screen {
        padding: 72px 8px 18px;
        display: block;
      }

      .quiz-hud {
        position: relative;
        top: auto;
        left: auto;
        right: auto;
        z-index: 8;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 5px;
        margin: 0 0 10px;
      }

      .hud-card {
        padding: 7px 6px;
        border-radius: 11px;
        text-align: center;
      }

      .hud-card small {
        display: none;
      }

      .hud-card strong {
        font-size: .8rem;
      }

      .quiz-panel {
        width: min(96vw, 680px);
        min-height: auto;
        margin: 8px auto 0;
        padding: 26px 16px 18px;
        background: rgba(255,255,255,.88);
        border: 3px solid #111;
        border-radius: 18px;
        box-shadow: 0 16px 44px rgba(0,0,0,.52);
      }

      .quiz-panel::before {
        display: none;
      }

      .quote-line {
        text-align: center;
        font-size: .8rem;
        margin-bottom: 10px;
      }

      .question-kicker {
        font-size: .86rem;
      }

      .question-text {
        min-height: 96px;
        font-size: clamp(1.55rem, 7vw, 2.35rem);
        line-height: 1.08;
      }

      .answers-grid {
        gap: 9px;
        margin-top: 14px;
      }

      .answer-btn {
        min-height: 54px;
        border-radius: 13px;

    /* =============================================================
       AJUSTE FINAL SOLICITADO — BALÃO PRÓXIMO À MÃO DO CHORÃO + FONTES MENORES

    body.tela-pergunta .answer-btn {

<body class="tela-dificuldade">
  <header class="topbar" aria-label="Controles do quiz">
    <div class="topbar-left">
      <a class="menu-btn" href="index.html">← Menu principal</a>
    </div>

    <div class="topbar-center">
      <div class="mode-pill">Modo Quiz</div>
    </div>

    <div class="topbar-actions">
      <button id="btn5050" class="power-btn" type="button">50/50 <span id="count5050">0</span></button>
      <button id="btnPular" class="power-btn" type="button">Pular <span id="countPular">0</span></button>
    </div>
  </header>

  <main id="app">
    <section id="difficultyScreen" class="screen active difficulty-screen" aria-label="Escolha de dificuldade">
      <div class="difficulty-shell">
        <div class="difficulty-title">
          <small>Quiz por níveis</small>
          <h1>Escolha a Dificuldade</h1>
          <p>O quiz tem 8 níveis. Você precisa acertar pelo menos 90% das perguntas do nível para avançar.</p>
        </div>

        <div class="difficulty-actions">
          <button class="level-card level-easy" type="button" data-difficulty="facil" aria-label="Selecionar nível fácil">
            <span class="sr-only">Selecionar nível fácil</span>
          </button>

          <button class="level-card level-normal" type="button" data-difficulty="normal" aria-label="Selecionar nível normal">
            <span class="sr-only">Selecionar nível normal</span>
          </button>

          <button class="level-card level-hard" type="button" data-difficulty="dificil" aria-label="Selecionar nível difícil">
            <span class="sr-only">Selecionar nível difícil</span>
          </button>
        </div>
      </div>
    </section>

    <section id="quizScreen" class="screen quiz-screen" aria-label="Perguntas do quiz">
      <div id="choraoBalloon" class="chorao-balloon" aria-live="polite" aria-hidden="true"></div>
      <div class="quiz-hud" aria-label="Progresso do nível">
        <div class="hud-card">
          <small>Pergunta</small>
          <strong id="hudPergunta">0/0</strong>
        </div>
        <div class="hud-card">
          <small>Pontos</small>
          <strong id="hudPontos">0</strong>
        </div>
        <div class="hud-card">
          <small>Acertos</small>
          <strong id="hudAcertos">0</strong>
        </div>
        <div class="hud-card">
          <small>Nível</small>
          <strong id="hudNivel">1/8</strong>
        </div>
      </div>

      <article class="quiz-panel">
        <div id="quoteLine" class="quote-line">“Quem é de verdade sabe quem é de mentira.”</div>
        <div id="questionKicker" class="question-kicker">Pergunta 1 de 5</div>
        <div id="questionText" class="question-text" aria-live="polite"></div>
        <div id="answersGrid" class="answers-grid"></div>

        <div id="feedbackBox" class="feedback-box"></div>

        <div class="next-row">
          <button id="nextQuestionBtn" class="next-btn" type="button">Próxima pergunta →</button>
        </div>
      </article>
    </section>
  </main>

  <section id="resultOverlay" class="overlay" aria-label="Resultado do nível">
    <div class="overlay-card">
      <h2 id="resultTitle">Nível completo</h2>
      <p id="resultText"></p>
      <div id="resultPhrase" class="chorao-phrase"></div>
      <div class="overlay-actions">
        <button id="nextLevelBtn" class="primary-btn" type="button">Próximo nível</button>
        <button id="retryLevelBtn" class="primary-btn" type="button">Tentar de novo</button>
        <button class="secondary-btn" type="button" onclick="window.location.href='index.html'">Menu principal</button>
      </div>
    </div>
  </section>

  <div id="toast" class="toast"></div>

  <script>
    const CONFIG = {
      jsonPath: 'https://charlibriano.github.io/Quiz-CBJR-V2/perguntas.json',
      minApprovalPercent: 90,
      scoreCorrect: 100,
      scoreWrong: 0,
      typeSpeed: 15,
      answerDelay: 95,
      defaultPhrase: 'Dias de luta, dias de glória.'
    };

    const state = {
      levels: [],
      difficulty: 'normal',
      currentLevelIndex: 0,
      currentQuestionIndex: 0,
      score: 0,
      hits: 0,
      answered: false,
      currentQuestions: [],
      powerups: {
        fifty: 2,
        skip: 2
      }
    };

    const difficultySettings = {
      facil: {
        label: 'Fácil',
        fifty: 3,
        skip: 3,
        shuffleAnswers: false
      },
      normal: {
        label: 'Normal',
        fifty: 2,
        skip: 2,
        shuffleAnswers: true
      },
      dificil: {
        label: 'Difícil',
        fifty: 1,
        skip: 1,
        shuffleAnswers: true
      }
    };

    const fallbackPhrases = [
      'Dias de luta, dias de glória.',
      'O impossível é só questão de opinião.',
      'Cada escolha, uma renúncia.',
      'Só os loucos sabem.',
      'Quem é de verdade sabe quem é de mentira.',
      'Não busco a perfeição em ninguém, não quero que busquem isso em mim.'
    ];

    const els = {
      difficultyScreen: document.getElementById('difficultyScreen'),
      quizScreen: document.getElementById('quizScreen'),
      questionText: document.getElementById('questionText'),
      questionKicker: document.getElementById('questionKicker'),
      quoteLine: document.getElementById('quoteLine'),
      answersGrid: document.getElementById('answersGrid'),
      feedbackBox: document.getElementById('feedbackBox'),
      choraoBalloon: document.getElementById('choraoBalloon'),
      nextQuestionBtn: document.getElementById('nextQuestionBtn'),
      hudPergunta: document.getElementById('hudPergunta'),
      hudPontos: document.getElementById('hudPontos'),
      hudAcertos: document.getElementById('hudAcertos'),
      hudNivel: document.getElementById('hudNivel'),
      btn5050: document.getElementById('btn5050'),
      btnPular: document.getElementById('btnPular'),
      count5050: document.getElementById('count5050'),
      countPular: document.getElementById('countPular'),
      resultOverlay: document.getElementById('resultOverlay'),
      resultTitle: document.getElementById('resultTitle'),
      resultText: document.getElementById('resultText'),
      resultPhrase: document.getElementById('resultPhrase'),
      nextLevelBtn: document.getElementById('nextLevelBtn'),
      retryLevelBtn: document.getElementById('retryLevelBtn'),
      toast: document.getElementById('toast')
    };

    document.addEventListener('DOMContentLoaded', init);

    async function init() {
      attachEvents();
      document.body.classList.add('tela-dificuldade');
      document.body.classList.remove('tela-pergunta');
      els.difficultyScreen.classList.add('active');
      els.quizScreen.classList.remove('active');
      els.difficultyScreen.style.display = 'block';
      els.quizScreen.style.display = 'none';
      updatePowerupButtons();

      try {
        const response = await fetch(CONFIG.jsonPath, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error('Não foi possível carregar perguntas.json');
        }

        const data = await response.json();
        state.levels = normalizeLevels(data);

        if (!state.levels.length) {
          throw new Error('O perguntas.json não possui níveis válidos.');
        }
      } catch (error) {
        showFatalError(error.message);
      }
    }

    function attachEvents() {
      document.querySelectorAll('.level-card').forEach(button => {
        button.addEventListener('click', () => {
          const difficulty = button.dataset.difficulty || 'normal';
          button.classList.add('is-pressed');
          setTimeout(() => {
            button.classList.remove('is-pressed');
            startQuiz(difficulty);
          }, 220);
        });
      });

      els.btn5050.addEventListener('click', useFiftyFifty);
      els.btnPular.addEventListener('click', skipQuestion);
      els.nextQuestionBtn.addEventListener('click', nextQuestion);
      els.nextLevelBtn.addEventListener('click', goToNextLevel);
      els.retryLevelBtn.addEventListener('click', retryCurrentLevel);
    }

    function normalizeLevels(data) {
      if (!Array.isArray(data)) return [];

      if (data.length && data[0].perguntas) {
        return data.map((level, index) => ({
          nivel: level.nivel || index + 1,
          fraseChorao: level.fraseChorao || getFallbackPhrase(index),
          perguntas: normalizeQuestions(level.perguntas || [])
        })).filter(level => level.perguntas.length);
      }

      return [{
        nivel: 1,
        fraseChorao: CONFIG.defaultPhrase,
        perguntas: normalizeQuestions(data)
      }];
    }

    function normalizeQuestions(questions) {
      if (!Array.isArray(questions)) return [];

      return questions.map(item => {
        const question = item.pergunta || item.question || item.enunciado || '';
        const options = item.opcoes || item.alternativas || item.options || [];
        const answer = item.resposta || item.correta || item.answer || '';

        return {
          pergunta: cleanQuestionText(question),
          opcoes: Array.isArray(options) ? options : [],
          resposta: answer,
          curiosidade: item.curiosidade || item.explicacao || ''
        };
      }).filter(item => item.pergunta && item.opcoes.length >= 2 && item.resposta);
    }

    function cleanQuestionText(text) {
      return String(text)
        .replace(/"br"/gi, '<br>')
        .replace(/\s*<br\s*\/?\s*>\s*/gi, '<br>')
        .replace(/(<br>){3,}/gi, '<br><br>')
        .trim();
    }

    function startQuiz(difficulty) {
      if (!state.levels.length) {
        showToast('As perguntas ainda não foram carregadas.');
        return;
      }

      const settings = difficultySettings[difficulty] || difficultySettings.normal;
      state.difficulty = difficulty;
      state.currentLevelIndex = 0;
      state.score = 0;
      state.powerups.fifty = settings.fifty;
      state.powerups.skip = settings.skip;

      document.body.classList.remove('tela-dificuldade');
      document.body.classList.add('tela-pergunta');
      els.difficultyScreen.classList.remove('active');
      els.quizScreen.classList.add('active');
      els.difficultyScreen.style.display = 'none';
      els.quizScreen.style.display = 'block';
      els.resultOverlay.classList.remove('show');

      startLevel(0);
    }

    function startLevel(levelIndex) {
      const level = state.levels[levelIndex];
      const settings = difficultySettings[state.difficulty] || difficultySettings.normal;

      state.currentLevelIndex = levelIndex;
      state.currentQuestionIndex = 0;
      state.hits = 0;
      state.currentQuestions = shuffleArray(level.perguntas).map(question => ({
        ...question,
        opcoes: settings.shuffleAnswers ? shuffleArray(question.opcoes) : [...question.opcoes]
      }));

      updatePowerupButtons();
      renderQuestion();
    }

    function renderQuestion() {
      const question = getCurrentQuestion();
      if (!question) {
        finishLevel();
        return;
      }

      state.answered = false;
      els.feedbackBox.classList.remove('show');
      els.feedbackBox.innerHTML = '';
      hideChoraoBalloon();
      els.nextQuestionBtn.classList.remove('show');
      els.answersGrid.innerHTML = '';

      updateHud();
      updatePowerupButtons();

      els.questionKicker.textContent = `Pergunta ${state.currentQuestionIndex + 1} de ${state.currentQuestions.length}`;
      els.quoteLine.textContent = `“${getCurrentLevelPhrase()}”`;
      typeQuestion(question.pergunta);

      question.opcoes.forEach((option, index) => {
        const button = document.createElement('button');
        button.className = 'answer-btn';
        button.type = 'button';
        button.dataset.answer = option;
        button.innerHTML = `
          <span class="answer-letter">${String.fromCharCode(65 + index)}</span>
          <span>${escapeHtml(option)}</span>
        `;
        button.addEventListener('click', () => answerQuestion(option, button));
        els.answersGrid.appendChild(button);

        setTimeout(() => button.classList.add('show'), 220 + (index * CONFIG.answerDelay));
      });
    }

    function typeQuestion(text) {
      els.questionText.classList.remove('show');
      els.questionText.innerHTML = '';

      const tokens = tokenizeHtmlBreaks(text);
      let i = 0;

      requestAnimationFrame(() => {
        els.questionText.classList.add('show');
      });

      function tick() {
        if (i >= tokens.length) return;
        els.questionText.innerHTML += tokens[i];
        i++;
        setTimeout(tick, CONFIG.typeSpeed);
      }

      tick();
    }

    function tokenizeHtmlBreaks(text) {
      const output = [];
      const source = String(text);
      let i = 0;

      while (i < source.length) {
        if (source.slice(i, i + 4).toLowerCase() === '<br>') {
          output.push('<br>');
          i += 4;
        } else {
          output.push(escapeHtml(source[i]));
          i++;
        }
      }

      return output;
    }

    function answerQuestion(selected, button) {
      if (state.answered) return;

      const question = getCurrentQuestion();
      const isCorrect = selected === question.resposta;
      state.answered = true;

      disableAnswerButtons();

      if (isCorrect) {
        state.hits++;
        state.score += CONFIG.scoreCorrect;
        button.classList.add('correct');
        showCorrectFeedback(question.curiosidade);
      } else {
        button.classList.add('wrong');
        showWrongFeedback();
      }

      updateHud();
      updatePowerupButtons();

      // Avança automaticamente sem exibir botão de próxima pergunta.
      const delay = isCorrect ? 4200 : 1150;
      window.clearTimeout(answerQuestion._autoTimer);
      answerQuestion._autoTimer = window.setTimeout(() => {
        nextQuestion();
      }, delay);
    }

    function showCorrectFeedback(curiosity) {
      showChoraoBalloon(curiosity || 'Mandou bem nessa.');
    }

    function showWrongFeedback() {
      hideChoraoBalloon();
      els.feedbackBox.innerHTML = `
        <strong>Não foi dessa vez.</strong>
        A resposta certa não será revelada. Segue o jogo.
      `;
      els.feedbackBox.classList.add('show');
    }

    function showChoraoBalloon(message) {
      if (!els.choraoBalloon) return;

      els.choraoBalloon.innerHTML = escapeHtml(message);
      els.choraoBalloon.setAttribute('aria-hidden', 'false');
      els.choraoBalloon.classList.add('show');
    }

    function hideChoraoBalloon() {
      if (!els.choraoBalloon) return;

      els.choraoBalloon.classList.remove('show');
      els.choraoBalloon.setAttribute('aria-hidden', 'true');
      els.choraoBalloon.innerHTML = '';
    }

    function disableAnswerButtons() {
      els.answersGrid.querySelectorAll('.answer-btn').forEach(button => {
        button.disabled = true;
      });
    }

    function nextQuestion() {
      state.currentQuestionIndex++;
      if (state.currentQuestionIndex >= state.currentQuestions.length) {
        finishLevel();
      } else {
        renderQuestion();
      }
    }

    function finishLevel() {
      const total = state.currentQuestions.length;
      const minimum = Math.ceil(total * (CONFIG.minApprovalPercent / 100));
      const approved = state.hits >= minimum;
      const levelNumber = state.currentLevelIndex + 1;
      const phrase = getCurrentLevelPhrase();

      els.resultTitle.textContent = approved ? `Nível ${levelNumber} completo` : `Nível ${levelNumber} incompleto`;
      els.resultText.textContent = approved
        ? `Você acertou ${state.hits}/${total}. Mínimo para passar: ${minimum}/${total}.`
        : `Você acertou ${state.hits}/${total}. Para avançar, precisava acertar pelo menos ${minimum}/${total}.`;
      els.resultPhrase.textContent = phrase;

      els.nextLevelBtn.style.display = approved && state.currentLevelIndex < state.levels.length - 1 ? 'inline-flex' : 'none';
      els.retryLevelBtn.style.display = approved && state.currentLevelIndex >= state.levels.length - 1 ? 'none' : 'inline-flex';

      if (approved && state.currentLevelIndex >= state.levels.length - 1) {
        els.resultTitle.textContent = 'Quiz finalizado';
        els.resultText.textContent = `Você concluiu os ${state.levels.length} níveis com ${state.score} pontos.`;
      }

      els.resultOverlay.classList.add('show');
    }

    function goToNextLevel() {
      els.resultOverlay.classList.remove('show');
      startLevel(state.currentLevelIndex + 1);
    }

    function retryCurrentLevel() {
      els.resultOverlay.classList.remove('show');
      startLevel(state.currentLevelIndex);
    }

    function useFiftyFifty() {
      if (state.answered || state.powerups.fifty <= 0) return;

      const question = getCurrentQuestion();
      if (!question) return;

      const wrongButtons = Array.from(els.answersGrid.querySelectorAll('.answer-btn'))
        .filter(button => button.dataset.answer !== question.resposta && !button.disabled);

      shuffleArray(wrongButtons).slice(0, Math.min(2, wrongButtons.length)).forEach(button => {
        button.disabled = true;
        button.style.opacity = '.28';
        button.style.pointerEvents = 'none';
      });

      state.powerups.fifty--;
      updatePowerupButtons();
      showToast('Duas alternativas foram removidas.');
    }

    function skipQuestion() {
      if (state.answered || state.powerups.skip <= 0) return;

      state.powerups.skip--;
      updatePowerupButtons();
      showToast('Pergunta pulada.');

      setTimeout(() => {
        state.currentQuestionIndex++;
        if (state.currentQuestionIndex >= state.currentQuestions.length) {
          finishLevel();
        } else {
          renderQuestion();
        }
      }, 420);
    }

    function updateHud() {
      const total = state.currentQuestions.length || 0;
      els.hudPergunta.textContent = `${Math.min(state.currentQuestionIndex + 1, total)}/${total}`;
      els.hudPontos.textContent = state.score;
      els.hudAcertos.textContent = state.hits;
      els.hudNivel.textContent = `${state.currentLevelIndex + 1}/${state.levels.length || 8}`;
    }

    function updatePowerupButtons() {
      els.count5050.textContent = state.powerups.fifty;
      els.countPular.textContent = state.powerups.skip;
      els.btn5050.disabled = state.powerups.fifty <= 0 || state.answered || !els.quizScreen.classList.contains('active');
      els.btnPular.disabled = state.powerups.skip <= 0 || state.answered || !els.quizScreen.classList.contains('active');
    }

    function getCurrentQuestion() {
      return state.currentQuestions[state.currentQuestionIndex];
    }

    function getCurrentLevelPhrase() {
      const level = state.levels[state.currentLevelIndex];
      return (level && level.fraseChorao) || getFallbackPhrase(state.currentLevelIndex);
    }

    function getFallbackPhrase(index) {
      return fallbackPhrases[index % fallbackPhrases.length];
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        els.toast.classList.remove('show');
      }, 1800);
    }

    function showFatalError(message) {
      document.body.classList.remove('tela-dificuldade');
      document.body.style.background = '#000';
      document.getElementById('app').innerHTML = `
        <div class="error-state">
          <div>
            <div>Erro ao carregar o quiz</div>
            <p style="font-family:Arial;font-size:1rem;color:#fff;margin-top:14px">${escapeHtml(message)}</p>
          </div>
        </div>
      `;
    }

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
