<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modo Quiz - CBJR</title>
  <link rel="preconnect" href="https://raw.githubusercontent.com" />
  <style>
    @font-face {
      font-family: 'Elektrix';
      src: url('https://raw.githubusercontent.com/charlibriano/Quiz-CBJR/main/Elektrix-Bold.woff2') format('woff2'),
           url('https://raw.githubusercontent.com/charlibriano/Quiz-CBJR/main/Elektrix-Bold.woff') format('woff'),
           url('https://cdn.jsdelivr.net/gh/charlibriano/Quiz-CBJR/Elektrix%20Bold.ttf') format('truetype');
      font-weight: bold;
      font-display: swap;
    }

    :root {
      --yellow: #f1c40f;
      --green: #1ed760;
      --red: #ff3b30;
      --blue: #7a78ff;
      --white: #fff;
      --glass: rgba(0, 0, 0, .72);
      --glass-strong: rgba(0, 0, 0, .86);
      --line: rgba(255, 255, 255, .16);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      background: #030303 url('quiz-bg.jpg') center center / cover no-repeat fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(0,0,0,.34), rgba(0,0,0,.78));
      pointer-events: none;
    }

    button { font: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      width: min(1180px, calc(100% - 22px));
      margin: 10px auto 0;
      min-height: 54px;
      border-radius: 999px;
      border: 1px solid rgba(241,196,15,.32);
      background: rgba(0,0,0,.74);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      box-shadow: 0 0 28px rgba(0,0,0,.65);
    }

    .back-btn, .power-btn, .primary-btn {
      border: 1px solid rgba(241,196,15,.45);
      background: rgba(0,0,0,.72);
      color: #fff;
      border-radius: 999px;
      min-height: 38px;
      padding: 8px 15px;
      cursor: pointer;
      font-weight: 900;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .back-btn { color: var(--yellow); }
    .back-btn:hover, .power-btn:hover, .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(241,196,15,.34);
    }

    .top-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--yellow);
      font-family: 'Elektrix', Arial, sans-serif;
      letter-spacing: .06em;
      text-shadow: 0 0 12px rgba(241,196,15,.7);
    }

    .top-title::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 14px var(--green);
    }

    .top-actions { display: flex; align-items: center; gap: 8px; }
    .power-btn:disabled { opacity: .38; cursor: not-allowed; transform: none; box-shadow: none; }

    .screen {
      width: min(1180px, calc(100% - 22px));
      margin: 16px auto 34px;
    }

    .hidden { display: none !important; }

    .difficulty-screen {
      min-height: calc(100svh - 95px);
      display: grid;
      place-items: center;
      padding: 18px 0 34px;
    }

    .amp-panel {
      width: min(1080px, 100%);
      border-radius: 28px;
      padding: clamp(20px, 4vw, 42px);
      background: linear-gradient(180deg, rgba(0,0,0,.70), rgba(0,0,0,.90));
      border: 1px solid rgba(241,196,15,.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.11), 0 30px 90px rgba(0,0,0,.72);
      text-align: center;
    }

    .amp-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.62);
      border: 1px solid rgba(255,255,255,.18);
      font-size: .72rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(255,255,255,.78);
    }

    .amp-kicker::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
    }

    .amp-panel h1 {
      margin: 18px 0 10px;
      font-family: 'Elektrix', Arial, sans-serif;
      color: var(--yellow);
      font-size: clamp(2.4rem, 8vw, 5.2rem);
      line-height: .9;
      text-shadow: 0 0 18px rgba(241,196,15,.65), 4px 5px 0 rgba(0,0,0,.72);
    }

    .amp-panel p {
      max-width: 760px;
      margin: 0 auto 24px;
      color: rgba(255,255,255,.75);
      line-height: 1.5;
      font-weight: 700;
    }

    .difficulty-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    .difficulty-card {
      position: relative;
      min-height: 265px;
      border: 1px solid color-mix(in srgb, var(--accent) 58%, rgba(255,255,255,.18));
      border-radius: 22px;
      padding: 20px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 28%, color-mix(in srgb, var(--accent) 28%, transparent), transparent 40%),
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(0,0,0,.78));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.11), 0 18px 40px rgba(0,0,0,.55);
      cursor: pointer;
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
      color: white;
      text-align: left;
    }

    .difficulty-card:hover {
      transform: translateY(-5px) scale(1.01);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 0 30px color-mix(in srgb, var(--accent) 34%, transparent), 0 22px 48px rgba(0,0,0,.62);
      border-color: var(--accent);
    }

    .difficulty-card .led {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent), 0 0 28px var(--accent);
      margin-bottom: 18px;
    }

    .difficulty-card h2 {
      margin: 0;
      font-family: 'Elektrix', Arial, sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      color: var(--accent);
      text-shadow: 0 0 18px color-mix(in srgb, var(--accent) 70%, transparent);
    }

    .difficulty-card small {
      display: inline-block;
      margin: 8px 0 26px;
      color: rgba(255,255,255,.72);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-weight: 900;
    }

    .difficulty-card p { text-align: left; margin: 0 0 22px; font-weight: 700; }

    .difficulty-card .start-label {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 42px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: rgba(0,0,0,.58);
      font-weight: 950;
      letter-spacing: .04em;
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .hud-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .hud-card {
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.76);
      padding: 12px 14px;
      min-height: 72px;
      box-shadow: 0 10px 28px rgba(0,0,0,.42);
    }

    .hud-card span {
      display: block;
      color: rgba(255,255,255,.58);
      text-transform: uppercase;
      letter-spacing: .13em;
      font-weight: 950;
      font-size: .78rem;
      margin-bottom: 8px;
    }

    .hud-card strong {
      display: block;
      color: var(--yellow);
      font-family: 'Elektrix', Arial, sans-serif;
      font-size: 1.45rem;
      text-shadow: 0 0 14px rgba(241,196,15,.52);
    }

    .quiz-card {
      border: 1px solid rgba(241,196,15,.20);
      border-radius: 28px;
      padding: clamp(22px, 4vw, 38px);
      background: linear-gradient(145deg, rgba(0,0,0,.86), rgba(0,0,0,.72));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10), 0 28px 75px rgba(0,0,0,.72);
      overflow: hidden;
    }

    .quote {
      color: rgba(255,255,255,.72);
      font-style: italic;
      font-weight: 800;
      margin: 0 0 22px;
      text-shadow: 0 0 14px rgba(255,255,255,.16);
    }

    .question-title {
      margin: 0 0 28px;
      min-height: 2.7em;
      font-family: 'Elektrix', Arial, sans-serif;
      font-size: clamp(2rem, 6vw, 4.2rem);
      line-height: 1.08;
      color: white;
      text-shadow: 0 0 16px rgba(255,255,255,.48), 0 0 28px rgba(241,196,15,.38);
      word-break: break-word;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .answer-btn {
      min-height: 86px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.18);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.64));
      color: white;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      opacity: 0;
      transform: translateY(18px);
      animation: answerIn .42s ease forwards;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 12px 26px rgba(0,0,0,.42);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: rgba(241,196,15,.65);
      box-shadow: 0 0 24px rgba(241,196,15,.20), 0 14px 28px rgba(0,0,0,.46);
    }

    .answer-btn:disabled { cursor: not-allowed; }
    .answer-btn.correct { border-color: var(--green); background: linear-gradient(180deg, rgba(30,215,96,.34), rgba(0,0,0,.68)); box-shadow: 0 0 28px rgba(30,215,96,.34); }
    .answer-btn.wrong { border-color: var(--red); background: linear-gradient(180deg, rgba(255,59,48,.28), rgba(0,0,0,.68)); box-shadow: 0 0 24px rgba(255,59,48,.28); }

    @keyframes answerIn { to { opacity: 1; transform: translateY(0); } }

    .feedback {
      min-height: 64px;
      margin-top: 18px;
      padding: 15px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.62);
      color: rgba(255,255,255,.82);
      font-weight: 800;
      line-height: 1.45;
    }

    .feedback.good { border-color: rgba(30,215,96,.35); box-shadow: 0 0 22px rgba(30,215,96,.13); }
    .feedback.bad { border-color: rgba(255,59,48,.35); box-shadow: 0 0 22px rgba(255,59,48,.13); }

    .center-card {
      width: min(760px, 100%);
      margin: 40px auto;
      padding: clamp(24px, 5vw, 42px);
      border-radius: 28px;
      text-align: center;
      border: 1px solid rgba(241,196,15,.25);
      background: rgba(0,0,0,.82);
      box-shadow: 0 28px 80px rgba(0,0,0,.72);
    }

    .center-card h2 {
      margin: 0 0 14px;
      font-family: 'Elektrix', Arial, sans-serif;
      color: var(--yellow);
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1;
      text-shadow: 0 0 18px rgba(241,196,15,.55);
    }

    .center-card p { color: rgba(255,255,255,.78); line-height: 1.55; font-weight: 800; }

    .result-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .primary-btn {
      background: var(--yellow);
      color: #050505;
      border-color: rgba(255,255,255,.15);
      min-height: 46px;
      padding-inline: 22px;
    }

    @media (max-width: 780px) {
      body { background-attachment: scroll; }
      .topbar { border-radius: 22px; flex-wrap: wrap; justify-content: center; }
      .top-title { order: 3; width: 100%; justify-content: center; font-size: .9rem; }
      .back-btn, .power-btn { min-height: 34px; padding: 7px 11px; font-size: .88rem; }
      .difficulty-grid { grid-template-columns: 1fr; }
      .difficulty-card { min-height: 210px; }
      .hud-grid { grid-template-columns: repeat(2, 1fr); }
      .answers { grid-template-columns: 1fr; }
      .question-title { font-size: clamp(1.8rem, 10vw, 3.2rem); }
      .answer-btn { min-height: 72px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <button class="back-btn" type="button" onclick="location.href='index.html'">← Menu principal</button>
    <div class="top-title">Modo Quiz</div>
    <div class="top-actions">
      <button class="power-btn" id="fiftyBtn" type="button">50/50</button>
      <button class="power-btn" id="skipBtn" type="button">Pular</button>
    </div>
  </header>

  <main>
    <section id="difficultyScreen" class="screen difficulty-screen">
      <div class="amp-panel">
        <div class="amp-kicker">Quiz por níveis</div>
        <h1>Escolha a<br>Dificuldade</h1>
        <p>O quiz tem 8 níveis e usa a regra de aprovação: você precisa acertar pelo menos 90% das perguntas do nível para avançar.</p>
        <div class="difficulty-grid">
          <button class="difficulty-card" style="--accent: var(--green)" data-difficulty="easy" type="button">
            <div class="led"></div>
            <h2>Fácil</h2>
            <small>Aquecimento</small>
            <p>Mais tempo, mais ajuda e uma entrada mais tranquila no universo CBJR.</p>
            <span class="start-label">TOCAR AGORA</span>
          </button>
          <button class="difficulty-card" style="--accent: var(--yellow)" data-difficulty="normal" type="button">
            <div class="led"></div>
            <h2>Normal</h2>
            <small>Equilíbrio</small>
            <p>O modo principal: ritmo firme, pontuação melhor e desafio na medida certa.</p>
            <span class="start-label">LIGAR GUITARRA</span>
          </button>
          <button class="difficulty-card" style="--accent: var(--red)" data-difficulty="hard" type="button">
            <div class="led"></div>
            <h2>Difícil</h2>
            <small>Sem pausa</small>
            <p>Menos margem de erro, menos ajuda e pressão máxima no amplificador.</p>
            <span class="start-label">DISTORCER</span>
          </button>
        </div>
      </div>
    </section>

    <section id="quizScreen" class="screen hidden">
      <div class="hud-grid">
        <div class="hud-card"><span>Pergunta</span><strong id="questionCount">0/0</strong></div>
        <div class="hud-card"><span>Pontos</span><strong id="scoreCount">0</strong></div>
        <div class="hud-card"><span>Acertos</span><strong id="correctCount">0</strong></div>
        <div class="hud-card"><span>Nível</span><strong id="levelCount">1/8</strong></div>
      </div>
      <article class="quiz-card">
        <p class="quote" id="levelQuote"></p>
        <h2 class="question-title" id="questionText"></h2>
        <div class="answers" id="answers"></div>
        <div class="feedback" id="feedback">Escolha uma resposta para continuar.</div>
      </article>
    </section>

    <section id="resultScreen" class="screen hidden">
      <div class="center-card">
        <h2 id="resultTitle">Resultado</h2>
        <p id="resultText"></p>
        <div class="result-actions" id="resultActions"></div>
      </div>
    </section>
  </main>

  <script>
    const PASS_RATE = 0.90;
    const settings = {
      easy: { label: 'Fácil', points: 10, helps: 2, skips: 2 },
      normal: { label: 'Normal', points: 15, helps: 1, skips: 1 },
      hard: { label: 'Difícil', points: 20, helps: 1, skips: 0 }
    };

    const els = {
      difficulty: document.getElementById('difficultyScreen'),
      quiz: document.getElementById('quizScreen'),
      result: document.getElementById('resultScreen'),
      questionText: document.getElementById('questionText'),
      answers: document.getElementById('answers'),
      feedback: document.getElementById('feedback'),
      questionCount: document.getElementById('questionCount'),
      scoreCount: document.getElementById('scoreCount'),
      correctCount: document.getElementById('correctCount'),
      levelCount: document.getElementById('levelCount'),
      levelQuote: document.getElementById('levelQuote'),
      fiftyBtn: document.getElementById('fiftyBtn'),
      skipBtn: document.getElementById('skipBtn'),
      resultTitle: document.getElementById('resultTitle'),
      resultText: document.getElementById('resultText'),
      resultActions: document.getElementById('resultActions')
    };

    const state = {
      levels: [],
      difficulty: null,
      levelIndex: 0,
      questionIndex: 0,
      score: 0,
      levelCorrect: 0,
      totalCorrect: 0,
      usedFifty: 0,
      usedSkip: 0,
      locked: false,
      currentQuestions: []
    };

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatQuestion(text) {
      return escapeHtml(text)
        .replace(/&quot;\s*br\s*&quot;/gi, '<br>')
        .replace(/&#039;\s*br\s*&#039;/gi, '<br>')
        .replace(/&lt;br\s*\/?&gt;/gi, '<br>');
    }

    let typingTimer = null;
    function typeQuestion(html) {
      clearTimeout(typingTimer);
      els.questionText.innerHTML = '';
      let i = 0;
      function step() {
        if (i >= html.length) return;
        if (html.slice(i, i + 4).toLowerCase() === '<br>') {
          els.questionText.innerHTML += '<br>';
          i += 4;
        } else {
          els.questionText.innerHTML += html[i];
          i++;
        }
        typingTimer = setTimeout(step, 15);
      }
      step();
    }

    async function loadQuestions() {
      try {
        const res = await fetch('perguntas.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('Não foi possível carregar perguntas.json');
        const data = await res.json();
        state.levels = normalizeLevels(data);
        if (!state.levels.length) throw new Error('perguntas.json vazio ou em formato inválido');
      } catch (err) {
        els.difficulty.innerHTML = `<div class="center-card"><h2>Erro</h2><p>${escapeHtml(err.message)}. Confirme se perguntas.json está na raiz junto com quiz.html.</p></div>`;
      }
    }

    function normalizeLevels(data) {
      if (!Array.isArray(data)) return [];
      if (data.length && data[0].perguntas) {
        return data.map((level, idx) => ({
          nivel: level.nivel || idx + 1,
          fraseChorao: level.fraseChorao || '',
          perguntas: (level.perguntas || []).map(normalizeQuestion).filter(Boolean)
        })).filter(level => level.perguntas.length);
      }
      return [{ nivel: 1, fraseChorao: '', perguntas: data.map(normalizeQuestion).filter(Boolean) }];
    }

    function normalizeQuestion(q) {
      const pergunta = q.pergunta || q.question || '';
      const opcoes = q.opcoes || q.respostas || q.options || [];
      const resposta = q.resposta || q.correta || q.answer || '';
      if (!pergunta || !Array.isArray(opcoes) || !opcoes.length || !resposta) return null;
      return { pergunta, opcoes, resposta, curiosidade: q.curiosidade || '' };
    }

    function showOnly(screen) {
      [els.difficulty, els.quiz, els.result].forEach(el => el.classList.add('hidden'));
      screen.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function startGame(difficulty) {
      if (!state.levels.length) return;
      state.difficulty = difficulty;
      state.levelIndex = 0;
      state.questionIndex = 0;
      state.score = 0;
      state.totalCorrect = 0;
      state.usedFifty = 0;
      state.usedSkip = 0;
      startLevel(0);
    }

    function startLevel(index) {
      state.levelIndex = index;
      state.questionIndex = 0;
      state.levelCorrect = 0;
      state.locked = false;
      state.currentQuestions = shuffle(state.levels[index].perguntas);
      showOnly(els.quiz);
      renderQuestion();
    }

    function renderQuestion() {
      state.locked = false;
      const level = state.levels[state.levelIndex];
      const q = state.currentQuestions[state.questionIndex];
      els.levelQuote.textContent = level.fraseChorao ? `“${level.fraseChorao}”` : '';
      els.feedback.className = 'feedback';
      els.feedback.textContent = 'Escolha uma resposta para continuar.';
      els.questionCount.textContent = `${state.questionIndex + 1}/${state.currentQuestions.length}`;
      els.scoreCount.textContent = state.score;
      els.correctCount.textContent = state.levelCorrect;
      els.levelCount.textContent = `${state.levelIndex + 1}/${state.levels.length}`;
      els.fiftyBtn.disabled = state.usedFifty >= settings[state.difficulty].helps;
      els.skipBtn.disabled = state.usedSkip >= settings[state.difficulty].skips;
      els.fiftyBtn.textContent = `50/50 ${Math.max(0, settings[state.difficulty].helps - state.usedFifty)}`;
      els.skipBtn.textContent = `Pular ${Math.max(0, settings[state.difficulty].skips - state.usedSkip)}`;
      typeQuestion(formatQuestion(q.pergunta));
      renderAnswers(q);
    }

    function renderAnswers(q) {
      els.answers.innerHTML = '';
      shuffle(q.opcoes).forEach((option, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'answer-btn';
        btn.style.animationDelay = `${index * 85}ms`;
        btn.textContent = option;
        btn.addEventListener('click', () => answerQuestion(option, btn));
        els.answers.appendChild(btn);
      });
    }

    function answerQuestion(option, btn) {
      if (state.locked) return;
      state.locked = true;
      const q = state.currentQuestions[state.questionIndex];
      const correct = option === q.resposta;
      [...els.answers.children].forEach(b => b.disabled = true);
      if (correct) {
        btn.classList.add('correct');
        state.levelCorrect++;
        state.totalCorrect++;
        state.score += settings[state.difficulty].points;
        els.feedback.className = 'feedback good';
        els.feedback.innerHTML = `<strong>Mandou bem!</strong>${q.curiosidade ? '<br>' + escapeHtml(q.curiosidade) : ''}`;
      } else {
        btn.classList.add('wrong');
        els.feedback.className = 'feedback bad';
        els.feedback.textContent = 'Não foi dessa vez. A resposta certa não será revelada.';
      }
      setTimeout(nextQuestion, correct ? 2300 : 1500);
    }

    function nextQuestion() {
      state.questionIndex++;
      if (state.questionIndex >= state.currentQuestions.length) {
        finishLevel();
      } else {
        renderQuestion();
      }
    }

    function finishLevel() {
      const total = state.currentQuestions.length;
      const needed = Math.ceil(total * PASS_RATE);
      const passed = state.levelCorrect >= needed;
      const levelNumber = state.levelIndex + 1;
      showOnly(els.result);
      els.resultActions.innerHTML = '';
      if (passed) {
        els.resultTitle.textContent = `Nível ${levelNumber} completo`;
        els.resultText.innerHTML = `Você acertou <strong>${state.levelCorrect}/${total}</strong>. Mínimo para passar: <strong>${needed}/${total}</strong>.`;
        const nextBtn = document.createElement('button');
        nextBtn.className = 'primary-btn';
        nextBtn.textContent = state.levelIndex + 1 >= state.levels.length ? 'Ver resultado final' : 'Próximo nível';
        nextBtn.onclick = () => {
          if (state.levelIndex + 1 >= state.levels.length) finishGame();
          else startLevel(state.levelIndex + 1);
        };
        els.resultActions.appendChild(nextBtn);
      } else {
        els.resultTitle.textContent = `Nível ${levelNumber} não liberado`;
        els.resultText.innerHTML = `Você acertou <strong>${state.levelCorrect}/${total}</strong>. Para avançar precisa de <strong>${needed}/${total}</strong>. Refaça este nível para continuar.`;
        const retryBtn = document.createElement('button');
        retryBtn.className = 'primary-btn';
        retryBtn.textContent = 'Refazer nível';
        retryBtn.onclick = () => startLevel(state.levelIndex);
        els.resultActions.appendChild(retryBtn);
      }
      const menuBtn = document.createElement('button');
      menuBtn.className = 'power-btn';
      menuBtn.textContent = 'Menu principal';
      menuBtn.onclick = () => location.href = 'index.html';
      els.resultActions.appendChild(menuBtn);
    }

    function finishGame() {
      showOnly(els.result);
      els.resultTitle.textContent = 'Quiz finalizado';
      els.resultText.innerHTML = `Você concluiu os <strong>${state.levels.length}</strong> níveis. Pontuação final: <strong>${state.score}</strong>.`;
      els.resultActions.innerHTML = '';
      const againBtn = document.createElement('button');
      againBtn.className = 'primary-btn';
      againBtn.textContent = 'Jogar de novo';
      againBtn.onclick = () => showOnly(els.difficulty);
      els.resultActions.appendChild(againBtn);
    }

    function useFiftyFifty() {
      if (state.locked || state.usedFifty >= settings[state.difficulty].helps) return;
      const q = state.currentQuestions[state.questionIndex];
      const wrongButtons = [...els.answers.children].filter(btn => btn.textContent !== q.resposta && !btn.disabled);
      shuffle(wrongButtons).slice(0, 2).forEach(btn => {
        btn.disabled = true;
        btn.style.opacity = '.25';
      });
      state.usedFifty++;
      els.fiftyBtn.disabled = state.usedFifty >= settings[state.difficulty].helps;
      els.fiftyBtn.textContent = `50/50 ${Math.max(0, settings[state.difficulty].helps - state.usedFifty)}`;
    }

    function skipQuestion() {
      if (state.locked || state.usedSkip >= settings[state.difficulty].skips) return;
      state.usedSkip++;
      nextQuestion();
    }

    document.querySelectorAll('.difficulty-card').forEach(card => {
      card.addEventListener('click', () => startGame(card.dataset.difficulty));
    });
    els.fiftyBtn.addEventListener('click', useFiftyFifty);
    els.skipBtn.addEventListener('click', skipQuestion);

    loadQuestions();
  </script>
</body>
</html>
