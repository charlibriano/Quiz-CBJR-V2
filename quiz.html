<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modo Quiz - CBJR</title>

  <style>
    @font-face {
      font-family: 'Elektrix';
      src: url('https://raw.githubusercontent.com/charlibriano/Quiz-CBJR-V2/main/Elektrix-Bold.woff2') format('woff2'),
           url('https://raw.githubusercontent.com/charlibriano/Quiz-CBJR-V2/main/Elektrix-Bold.woff') format('woff'),
           url('https://cdn.jsdelivr.net/gh/charlibriano/Quiz-CBJR-V2/Elektrix%20Bold.ttf') format('truetype');
      font-weight: bold;
      font-display: swap;
    }

    :root {
      --yellow: #f1c40f;
      --green: #1ed760;
      --red: #ff3b32;
      --blue: #3498db;
      --bg: #030303;
      --glass: rgba(0,0,0,.68);
      --line: rgba(255,255,255,.16);
      --soft: rgba(255,255,255,.76);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    body.mode-select {
      background:
        linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.36)),
        url('quiz-bg.jpg') center top / cover no-repeat fixed,
        #050505;
    }

    body.mode-game {
      background:
        radial-gradient(circle at 20% 20%, rgba(241,196,15,.16), transparent 28%),
        radial-gradient(circle at 82% 16%, rgba(30,215,96,.10), transparent 26%),
        linear-gradient(135deg, rgba(0,0,0,.62), rgba(0,0,0,.94)),
        url('cbjr.png') center center / cover no-repeat fixed,
        #050505;
    }

    body.mode-game::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 34px 34px;
      opacity: .32;
    }

    .topbar {
      position: fixed;
      top: 12px;
      left: 14px;
      right: 14px;
      height: 58px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(241,196,15,.28);
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 16px 42px rgba(0,0,0,.55);
    }

    .back-btn,
    .power-btn {
      border: 1px solid rgba(255,255,255,.18);
      color: #fff;
      background: rgba(255,255,255,.08);
      min-height: 40px;
      padding: 0 18px;
      border-radius: 999px;
      font-weight: 900;
      cursor: pointer;
      transition: .2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .back-btn {
      border-color: rgba(241,196,15,.75);
      color: var(--yellow);
      box-shadow: 0 0 18px rgba(241,196,15,.12);
    }

    .back-btn:hover,
    .power-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 0 22px rgba(241,196,15,.26);
    }

    .top-title {
      font-family: 'Elektrix', Arial, sans-serif;
      color: var(--yellow);
      letter-spacing: .08em;
      text-shadow: 0 0 16px rgba(241,196,15,.45);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      min-width: 0;
    }

    .top-title::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
      flex: 0 0 auto;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .power-btn {
      font-size: .95rem;
      background: rgba(255,255,255,.10);
    }

    .power-btn:disabled {
      opacity: .38;
      cursor: not-allowed;
    }

    .screen {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .hidden { display: none !important; }

    /* TELA DE DIFICULDADE */
    #difficulty-screen {
      min-height: 100svh;
      padding-top: 90px;
    }

    .difficulty-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.18) 45%, rgba(0,0,0,.26));
      z-index: 0;
    }

    .difficulty-buttons {
      position: fixed;
      left: 0;
      right: 0;
      bottom: clamp(40px, 8vh, 95px);
      z-index: 3;
      display: grid;
      grid-template-columns: repeat(3, minmax(170px, 1fr));
      gap: clamp(22px, 3vw, 46px);
      width: min(1120px, 88vw);
      margin: 0 auto;
      pointer-events: auto;
    }

    .difficulty-btn {
      min-height: 58px;
      border-radius: 999px;
      border: 2px solid currentColor;
      background: rgba(0,0,0,.50);
      color: #fff;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 18px 40px rgba(0,0,0,.58);
      transition: .22s ease;
    }

    .difficulty-btn.easy { color: var(--green); }
    .difficulty-btn.normal { color: var(--yellow); }
    .difficulty-btn.hard { color: var(--red); }

    .difficulty-btn:hover {
      transform: translateY(-4px) scale(1.035);
      box-shadow: 0 0 26px currentColor, 0 20px 42px rgba(0,0,0,.72);
      background: rgba(0,0,0,.68);
    }

    .difficulty-hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 3;
      color: rgba(255,255,255,.70);
      font-size: .85rem;
      text-align: center;
      letter-spacing: .03em;
      text-shadow: 0 2px 12px rgba(0,0,0,.9);
    }

    /* QUIZ */
    #quiz-screen {
      padding: 92px 18px 26px;
    }

    .hud {
      width: min(1180px, 100%);
      margin: 0 auto 14px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .hud-card {
      min-height: 70px;
      border-radius: 18px;
      padding: 13px 15px;
      background: rgba(0,0,0,.60);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 16px 38px rgba(0,0,0,.42);
    }

    .hud-card small {
      display: block;
      color: rgba(255,255,255,.60);
      text-transform: uppercase;
      letter-spacing: .14em;
      font-weight: 950;
      margin-bottom: 8px;
    }

    .hud-card strong {
      font-family: 'Elektrix', Arial, sans-serif;
      color: var(--yellow);
      font-size: 1.15rem;
      text-shadow: 0 0 12px rgba(241,196,15,.35);
    }

    .quiz-panel {
      width: min(1180px, 100%);
      margin: 0 auto;
      min-height: 520px;
      padding: clamp(20px, 4vw, 38px);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(8,8,8,.82), rgba(0,0,0,.86)),
        radial-gradient(circle at 50% 0%, rgba(241,196,15,.12), transparent 42%);
      border: 1px solid rgba(241,196,15,.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 26px 82px rgba(0,0,0,.66);
      overflow: hidden;
      position: relative;
    }

    .quiz-panel::before {
      content: "Modo Quiz";
      position: absolute;
      left: 28px;
      top: 24px;
      font-family: 'Elektrix', Arial, sans-serif;
      color: rgba(241,196,15,.18);
      font-size: clamp(2.8rem, 8vw, 7rem);
      pointer-events: none;
      line-height: 1;
      filter: blur(.2px);
    }

    .quote {
      position: relative;
      z-index: 2;
      color: rgba(255,255,255,.72);
      font-style: italic;
      font-weight: 700;
      font-size: clamp(.95rem, 1.3vw, 1.08rem);
      margin: 10px 0 28px;
    }

    .question-text {
      position: relative;
      z-index: 2;
      min-height: 130px;
      display: flex;
      align-items: center;
      color: #fff;
      font-family: 'Elektrix', Arial, sans-serif;
      font-size: clamp(2.2rem, 5vw, 4.9rem);
      line-height: 1.08;
      letter-spacing: .015em;
      text-shadow:
        0 0 12px rgba(255,255,255,.55),
        0 0 26px rgba(241,196,15,.30),
        4px 5px 0 rgba(0,0,0,.62);
      opacity: 0;
      transform: translateY(14px);
      transition: opacity .4s ease, transform .4s ease;
    }

    .question-text.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .answers {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .answer-btn {
      min-height: 84px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.20);
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
        rgba(12,12,20,.76);
      color: #fff;
      font-size: clamp(1rem, 1.35vw, 1.35rem);
      font-weight: 900;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10), 0 12px 30px rgba(0,0,0,.34);
      transition: .22s ease;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(18px);
    }

    .answer-btn.show {
      opacity: 1;
      transform: translateY(0);
    }

    .answer-btn::before {
      content: attr(data-key);
      position: absolute;
      left: 16px;
      top: 12px;
      color: rgba(255,255,255,.46);
      font-size: .78rem;
      font-weight: 950;
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      border-color: rgba(241,196,15,.58);
      box-shadow: 0 0 22px rgba(241,196,15,.18), 0 14px 34px rgba(0,0,0,.46);
    }

    .answer-btn:disabled {
      cursor: not-allowed;
    }

    .answer-btn.correct {
      background: linear-gradient(180deg, rgba(30,215,96,.92), rgba(10,126,55,.88));
      border-color: rgba(30,215,96,.96);
      box-shadow: 0 0 28px rgba(30,215,96,.52);
    }

    .answer-btn.wrong {
      background: linear-gradient(180deg, rgba(255,59,50,.92), rgba(145,19,16,.88));
      border-color: rgba(255,59,50,.96);
      box-shadow: 0 0 28px rgba(255,59,50,.45);
      animation: shake .42s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      50% { transform: translateX(7px); }
      75% { transform: translateX(-4px); }
    }

    .feedback {
      position: relative;
      z-index: 2;
      margin-top: 18px;
      min-height: 54px;
      color: rgba(255,255,255,.78);
      line-height: 1.45;
      font-size: 1rem;
      display: none;
    }

    .feedback.show {
      display: block;
    }

    .feedback strong {
      color: var(--yellow);
      font-family: 'Elektrix', Arial, sans-serif;
      font-size: 1.25rem;
    }

    .next-btn {
      margin-top: 16px;
      min-height: 48px;
      min-width: 180px;
      border-radius: 999px;
      border: 0;
      background: var(--yellow);
      color: #050505;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(241,196,15,.25);
    }

    .message-screen {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(0,0,0,.76);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .message-screen.show {
      display: grid;
    }

    .message-card {
      width: min(760px, 100%);
      border-radius: 30px;
      padding: clamp(24px, 5vw, 44px);
      text-align: center;
      background:
        linear-gradient(180deg, rgba(8,8,8,.92), rgba(0,0,0,.86)),
        radial-gradient(circle at 50% 0%, rgba(241,196,15,.16), transparent 52%);
      border: 1px solid rgba(241,196,15,.34);
      box-shadow: 0 30px 90px rgba(0,0,0,.78), 0 0 38px rgba(241,196,15,.12);
    }

    .message-card h2 {
      margin: 0 0 12px;
      font-family: 'Elektrix', Arial, sans-serif;
      color: var(--yellow);
      font-size: clamp(2.3rem, 7vw, 5rem);
      line-height: .95;
      text-shadow: 0 0 24px rgba(241,196,15,.38), 4px 5px 0 rgba(0,0,0,.58);
    }

    .message-card p {
      color: rgba(255,255,255,.82);
      font-weight: 800;
      line-height: 1.45;
      font-size: clamp(1rem, 1.8vw, 1.18rem);
    }

    .chorao-line {
      margin: 22px auto 20px;
      padding: 18px 20px;
      border-radius: 20px;
      border: 1px solid rgba(241,196,15,.26);
      background: rgba(0,0,0,.36);
      color: #fff;
      font-style: italic;
      text-shadow: 0 0 12px rgba(255,255,255,.25);
    }

    .message-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .primary-btn,
    .secondary-btn {
      min-height: 54px;
      min-width: 190px;
      padding: 0 24px;
      border-radius: 999px;
      font-weight: 950;
      cursor: pointer;
    }

    .primary-btn {
      border: 0;
      background: var(--yellow);
      color: #050505;
    }

    .secondary-btn {
      border: 1px solid rgba(241,196,15,.56);
      background: rgba(0,0,0,.26);
      color: #fff;
    }

    @media (max-width: 780px) {
      .topbar {
        height: auto;
        min-height: 54px;
        top: 8px;
        left: 8px;
        right: 8px;
        padding: 7px;
      }

      .top-title {
        font-size: .75rem;
        letter-spacing: .05em;
      }

      .back-btn, .power-btn {
        min-height: 36px;
        padding: 0 12px;
        font-size: .82rem;
      }

      .top-actions {
        gap: 5px;
      }

      body.mode-select {
        background-size: cover;
        background-position: center top;
      }

      .difficulty-buttons {
        grid-template-columns: 1fr;
        width: min(320px, 76vw);
        gap: 12px;
        bottom: 34px;
      }

      .difficulty-btn {
        min-height: 46px;
        font-size: .78rem;
      }

      .difficulty-hint {
        display: none;
      }

      #quiz-screen {
        padding: 82px 8px 18px;
      }

      .hud {
        grid-template-columns: repeat(2, 1fr);
        gap: 7px;
      }

      .hud-card {
        min-height: 56px;
        padding: 9px 10px;
        border-radius: 13px;
      }

      .hud-card small {
        font-size: .62rem;
        margin-bottom: 5px;
      }

      .hud-card strong {
        font-size: .9rem;
      }

      .quiz-panel {
        min-height: 480px;
        padding: 18px 14px;
        border-radius: 22px;
      }

      .quote {
        margin-top: 8px;
        font-size: .84rem;
      }

      .question-text {
        min-height: 120px;
        font-size: clamp(1.9rem, 9vw, 3.2rem);
        text-align: center;
        justify-content: center;
      }

      .answers {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .answer-btn {
        min-height: 62px;
        font-size: 1rem;
      }
    }

    @media (max-width: 430px) {
      .top-title {
        display: none;
      }
      .power-btn {
        padding: 0 10px;
      }
      .back-btn {
        max-width: 150px;
      }
    }
  </style>
</head>

<body class="mode-select">
  <header class="topbar">
    <a class="back-btn" href="index.html">← Menu principal</a>
    <div class="top-title">Modo Quiz</div>
    <div class="top-actions">
      <button id="fiftyBtn" class="power-btn" type="button">50/50 <span id="fiftyCount">0</span></button>
      <button id="skipBtn" class="power-btn" type="button">Pular <span id="skipCount">0</span></button>
    </div>
  </header>

  <main>
    <section id="difficulty-screen" class="screen">
      <div class="difficulty-overlay"></div>
      <div class="difficulty-buttons" aria-label="Escolha a dificuldade">
        <button class="difficulty-btn easy" type="button" data-difficulty="facil">Tocar agora</button>
        <button class="difficulty-btn normal" type="button" data-difficulty="normal">Ligar guitarra</button>
        <button class="difficulty-btn hard" type="button" data-difficulty="dificil">Distorcer</button>
      </div>
      <div class="difficulty-hint">A imagem define os níveis. O botão só inicia o jogo.</div>
    </section>

    <section id="quiz-screen" class="screen hidden">
      <div class="hud">
        <div class="hud-card"><small>Pergunta</small><strong id="hudQuestion">0/0</strong></div>
        <div class="hud-card"><small>Pontos</small><strong id="hudScore">0</strong></div>
        <div class="hud-card"><small>Acertos</small><strong id="hudCorrect">0</strong></div>
        <div class="hud-card"><small>Nível</small><strong id="hudLevel">1/8</strong></div>
      </div>

      <article class="quiz-panel">
        <p id="levelQuote" class="quote"></p>
        <h1 id="questionText" class="question-text"></h1>
        <div id="answers" class="answers"></div>
        <div id="feedback" class="feedback"></div>
      </article>
    </section>
  </main>

  <section id="levelMessage" class="message-screen">
    <div class="message-card">
      <h2 id="messageTitle">Nível completo</h2>
      <p id="messageResult"></p>
      <div id="messageQuote" class="chorao-line"></div>
      <div class="message-actions">
        <button id="messagePrimary" class="primary-btn" type="button">Próximo nível</button>
        <button class="secondary-btn" type="button" onclick="window.location.href='index.html'">Menu principal</button>
      </div>
    </div>
  </section>

  <script>
    const state = {
      data: [],
      difficulty: 'normal',
      levelIndex: 0,
      questionIndex: 0,
      score: 0,
      correct: 0,
      levelCorrect: 0,
      answered: false,
      fifty: 1,
      skip: 1,
      approvalRate: 0.9,
      typingTimer: null
    };

    const els = {
      difficultyScreen: document.getElementById('difficulty-screen'),
      quizScreen: document.getElementById('quiz-screen'),
      questionText: document.getElementById('questionText'),
      answers: document.getElementById('answers'),
      feedback: document.getElementById('feedback'),
      levelQuote: document.getElementById('levelQuote'),
      hudQuestion: document.getElementById('hudQuestion'),
      hudScore: document.getElementById('hudScore'),
      hudCorrect: document.getElementById('hudCorrect'),
      hudLevel: document.getElementById('hudLevel'),
      fiftyBtn: document.getElementById('fiftyBtn'),
      skipBtn: document.getElementById('skipBtn'),
      fiftyCount: document.getElementById('fiftyCount'),
      skipCount: document.getElementById('skipCount'),
      levelMessage: document.getElementById('levelMessage'),
      messageTitle: document.getElementById('messageTitle'),
      messageResult: document.getElementById('messageResult'),
      messageQuote: document.getElementById('messageQuote'),
      messagePrimary: document.getElementById('messagePrimary')
    };

    function sanitizeText(value) {
      return String(value || '')
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/"\s*br\s*"/gi, '\n')
        .replace(/\s+br\s+/gi, '\n')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    async function loadQuestions() {
      try {
        const res = await fetch('perguntas.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('Não foi possível carregar perguntas.json');
        const data = await res.json();

        if (!Array.isArray(data) || !data.length) {
          throw new Error('perguntas.json vazio ou em formato inválido');
        }

        state.data = data.map((level, i) => ({
          fraseChorao: sanitizeText(level.fraseChorao || `Nível ${i + 1}`),
          perguntas: (level.perguntas || []).map(q => ({
            pergunta: sanitizeText(q.pergunta),
            respostas: Array.isArray(q.respostas) ? q.respostas.map(sanitizeText) : [],
            correta: sanitizeText(q.correta),
            curiosidade: sanitizeText(q.curiosidade)
          }))
        })).filter(level => level.perguntas.length);

      } catch (error) {
        els.difficultyScreen.innerHTML = `
          <div style="min-height:100vh;display:grid;place-items:center;padding:20px;text-align:center;">
            <div style="max-width:620px;background:rgba(0,0,0,.75);border:1px solid rgba(241,196,15,.35);border-radius:24px;padding:28px;">
              <h1 style="color:#f1c40f;font-family:Elektrix,Arial,sans-serif;">Erro ao carregar o quiz</h1>
              <p>${error.message}</p>
              <p>Confirme se <strong>perguntas.json</strong> está na raiz do GitHub junto com o quiz.html.</p>
            </div>
          </div>`;
      }
    }

    function setDifficulty(difficulty) {
      state.difficulty = difficulty;

      if (difficulty === 'facil') {
        state.fifty = 2;
        state.skip = 2;
      } else if (difficulty === 'normal') {
        state.fifty = 1;
        state.skip = 1;
      } else {
        state.fifty = 0;
        state.skip = 0;
      }

      state.levelIndex = 0;
      state.questionIndex = 0;
      state.score = 0;
      state.correct = 0;
      state.levelCorrect = 0;
      startGame();
    }

    function startGame() {
      if (!state.data.length) return;

      document.body.classList.remove('mode-select');
      document.body.classList.add('mode-game');

      els.difficultyScreen.classList.add('hidden');
      els.quizScreen.classList.remove('hidden');
      renderQuestion();
    }

    function currentLevel() {
      return state.data[state.levelIndex];
    }

    function currentQuestion() {
      return currentLevel().perguntas[state.questionIndex];
    }

    function updateHud() {
      const level = currentLevel();
      els.hudQuestion.textContent = `${state.questionIndex + 1}/${level.perguntas.length}`;
      els.hudScore.textContent = state.score;
      els.hudCorrect.textContent = state.levelCorrect;
      els.hudLevel.textContent = `${state.levelIndex + 1}/${state.data.length}`;
      els.fiftyCount.textContent = state.fifty;
      els.skipCount.textContent = state.skip;
      els.fiftyBtn.disabled = state.fifty <= 0 || state.answered;
      els.skipBtn.disabled = state.skip <= 0 || state.answered;
    }

    function typeQuestion(text) {
      clearTimeout(state.typingTimer);
      els.questionText.classList.remove('is-visible');
      els.questionText.textContent = '';

      const normalized = sanitizeText(text);
      let i = 0;

      setTimeout(() => {
        els.questionText.classList.add('is-visible');
        const step = () => {
          if (i <= normalized.length) {
            els.questionText.textContent = normalized.slice(0, i);
            i++;
            state.typingTimer = setTimeout(step, 16);
          }
        };
        step();
      }, 100);
    }

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function renderQuestion() {
      state.answered = false;
      const level = currentLevel();
      const q = currentQuestion();

      els.feedback.className = 'feedback';
      els.feedback.innerHTML = '';
      els.levelQuote.textContent = `“${level.fraseChorao}”`;
      typeQuestion(q.pergunta);
      els.answers.innerHTML = '';

      const respostas = shuffle(q.respostas);
      respostas.forEach((answer, index) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.type = 'button';
        btn.dataset.key = index + 1;
        btn.textContent = answer;
        btn.addEventListener('click', () => answerQuestion(answer, btn));
        els.answers.appendChild(btn);

        setTimeout(() => btn.classList.add('show'), 260 + index * 140);
      });

      updateHud();
    }

    function answerQuestion(answer, clickedBtn) {
      if (state.answered) return;
      state.answered = true;

      const q = currentQuestion();
      const isCorrect = answer === q.correta;

      Array.from(els.answers.children).forEach(btn => btn.disabled = true);

      if (isCorrect) {
        clickedBtn.classList.add('correct');
        state.correct++;
        state.levelCorrect++;
        state.score += state.difficulty === 'dificil' ? 20 : state.difficulty === 'normal' ? 15 : 10;

        els.feedback.innerHTML = `<strong>Boa!</strong><br>${q.curiosidade || 'Resposta correta.'}<br><button class="next-btn" type="button">Continuar</button>`;
      } else {
        clickedBtn.classList.add('wrong');
        els.feedback.innerHTML = `<strong>Não foi dessa vez.</strong><br>A resposta certa não será revelada. Bora pra próxima sem perder o ritmo.<br><button class="next-btn" type="button">Continuar</button>`;
      }

      els.feedback.classList.add('show');
      els.feedback.querySelector('.next-btn').addEventListener('click', nextQuestion);
      updateHud();
    }

    function nextQuestion() {
      const level = currentLevel();

      if (state.questionIndex < level.perguntas.length - 1) {
        state.questionIndex++;
        renderQuestion();
      } else {
        finishLevel();
      }
    }

    function finishLevel() {
      const level = currentLevel();
      const total = level.perguntas.length;
      const minimum = Math.ceil(total * state.approvalRate);
      const passed = state.levelCorrect >= minimum;
      const isLast = state.levelIndex >= state.data.length - 1;

      els.levelMessage.classList.add('show');
      els.messageQuote.textContent = `“${level.fraseChorao}”`;

      if (passed && !isLast) {
        els.messageTitle.textContent = `Nível ${state.levelIndex + 1} completo`;
        els.messageResult.textContent = `Você acertou ${state.levelCorrect}/${total}. Mínimo para passar: ${minimum}/${total}.`;
        els.messagePrimary.textContent = `Próximo nível`;
        els.messagePrimary.onclick = () => {
          els.levelMessage.classList.remove('show');
          state.levelIndex++;
          state.questionIndex = 0;
          state.levelCorrect = 0;
          renderQuestion();
        };
      } else if (passed && isLast) {
        els.messageTitle.textContent = `Quiz finalizado`;
        els.messageResult.textContent = `Você concluiu todos os ${state.data.length} níveis. Pontuação final: ${state.score}.`;
        els.messagePrimary.textContent = `Jogar novamente`;
        els.messagePrimary.onclick = () => location.reload();
      } else {
        els.messageTitle.textContent = `Nível não concluído`;
        els.messageResult.textContent = `Você acertou ${state.levelCorrect}/${total}. Para avançar precisa de pelo menos ${minimum}/${total}.`;
        els.messagePrimary.textContent = `Tentar nível novamente`;
        els.messagePrimary.onclick = () => {
          els.levelMessage.classList.remove('show');
          state.questionIndex = 0;
          state.levelCorrect = 0;
          renderQuestion();
        };
      }
    }

    function useFifty() {
      if (state.fifty <= 0 || state.answered) return;

      const q = currentQuestion();
      const wrongButtons = Array.from(els.answers.children)
        .filter(btn => btn.textContent !== q.correta && !btn.disabled);

      shuffle(wrongButtons).slice(0, 2).forEach(btn => {
        btn.disabled = true;
        btn.style.opacity = '.22';
        btn.style.pointerEvents = 'none';
      });

      state.fifty--;
      updateHud();
    }

    function useSkip() {
      if (state.skip <= 0 || state.answered) return;
      state.skip--;
      updateHud();
      nextQuestion();
    }

    document.querySelectorAll('.difficulty-btn').forEach(btn => {
      btn.addEventListener('click', () => setDifficulty(btn.dataset.difficulty));
    });

    els.fiftyBtn.addEventListener('click', useFifty);
    els.skipBtn.addEventListener('click', useSkip);

    loadQuestions();
  </script>
</body>
</html>
