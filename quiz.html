<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modo Quiz - CBJR</title>

  <style>
    @font-face {
      font-family: 'Elektrix';
      src: url('https://raw.githubusercontent.com/charlibriano/Quiz-CBJR-V2/main/Elektrix-Bold.woff2') format('woff2'),
           url('https://raw.githubusercontent.com/charlibriano/Quiz-CBJR-V2/main/Elektrix-Bold.woff') format('woff'),
           url('https://cdn.jsdelivr.net/gh/charlibriano/Quiz-CBJR-V2/Elektrix%20Bold.ttf') format('truetype');
      font-weight: bold;
      font-display: swap;
    }

    :root {
      --yellow: #f1c40f;
      --green: #1ed760;
      --red: #e74c3c;
      --dark: #050505;
      --white: #fff;
      --muted: rgba(255,255,255,.68);
      --line: rgba(255,255,255,.16);
      --panel: rgba(0,0,0,.58);
      --easy: #2ecc71;
      --normal: #f1c40f;
      --hard: #e74c3c;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      background: #050505;
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
      background:
        linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.72)),
        radial-gradient(circle at 50% 35%, rgba(241,196,15,.12), transparent 36%),
        url('quiz-bg.jpg') center center / cover no-repeat fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 38px 38px;
      opacity: .45;
      mix-blend-mode: screen;
    }

    .topbar {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: min(1120px, calc(100% - 20px));
      min-height: 44px;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
    }

    .top-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--yellow);
      font-family: 'Elektrix', Arial, sans-serif;
      font-size: .98rem;
      letter-spacing: .06em;
      text-shadow: 0 0 14px rgba(241,196,15,.45);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-title::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green), 0 0 24px rgba(30,215,96,.55);
      flex: 0 0 auto;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 7px;
      flex: 0 0 auto;
    }

    .top-btn {
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: #fff;
      min-height: 30px;
      padding: 6px 10px;
      font-weight: 900;
      font-size: .78rem;
      cursor: pointer;
      transition: .2s ease;
    }

    .top-btn:hover:not(:disabled) {
      background: rgba(241,196,15,.18);
      border-color: rgba(241,196,15,.55);
      transform: translateY(-1px);
    }

    .top-btn:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .screen {
      width: min(1120px, calc(100% - 22px));
      min-height: 100svh;
      margin: 0 auto;
      padding: 74px 0 24px;
      display: none;
      position: relative;
      z-index: 2;
    }

    .screen.active { display: grid; }

    #difficulty-screen {
      place-items: center;
    }

    .amp-stage {
      width: min(980px, 100%);
      min-height: min(690px, calc(100svh - 110px));
      display: grid;
      align-content: center;
      gap: 22px;
      padding: clamp(14px, 2.6vw, 28px);
    }

    .amp-heading {
      text-align: center;
      padding: 12px 14px;
      border-radius: 22px;
      background: radial-gradient(circle at 50% 0%, rgba(241,196,15,.16), transparent 60%), rgba(0,0,0,.36);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 16px 48px rgba(0,0,0,.38);
    }

    .amp-heading small {
      display: inline-block;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: .18em;
      font-weight: 900;
      font-size: .7rem;
      margin-bottom: 8px;
    }

    .amp-heading h1 {
      margin: 0;
      font-family: 'Elektrix', Arial, sans-serif;
      color: var(--yellow);
      font-size: clamp(2.1rem, 5vw, 4.4rem);
      line-height: .9;
      text-shadow: 0 0 20px rgba(241,196,15,.46), 4px 5px 0 rgba(0,0,0,.7);
    }

    .amp-heading p {
      margin: 12px auto 0;
      max-width: 660px;
      color: rgba(255,255,255,.72);
      line-height: 1.45;
      font-size: .96rem;
    }

    .difficulty-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(10px, 2vw, 18px);
    }

    .amp-btn {
      --accent: var(--normal);
      position: relative;
      min-height: 210px;
      padding: 14px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.18);
      color: #fff;
      text-align: left;
      cursor: pointer;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.02)),
        radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--accent) 24%, transparent), transparent 56%),
        rgba(0,0,0,.62);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        inset 0 -22px 42px rgba(0,0,0,.54),
        0 22px 54px rgba(0,0,0,.46);
      transition: .22s ease;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
    }

    .amp-btn:hover {
      transform: translateY(-6px);
      border-color: color-mix(in srgb, var(--accent) 70%, white 14%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.2),
        inset 0 -22px 42px rgba(0,0,0,.44),
        0 0 0 1px color-mix(in srgb, var(--accent) 35%, transparent),
        0 22px 60px rgba(0,0,0,.55),
        0 0 34px color-mix(in srgb, var(--accent) 28%, transparent);
    }

    .amp-btn:active,
    .amp-btn.loading {
      transform: translateY(2px) scale(.985);
    }

    .amp-btn.easy { --accent: var(--easy); }
    .amp-btn.normal { --accent: var(--normal); }
    .amp-btn.hard { --accent: var(--hard); }

    .amp-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.04) 0 1px, transparent 1px 11px),
        linear-gradient(120deg, transparent, rgba(255,255,255,.08), transparent);
      opacity: .55;
      pointer-events: none;
    }

    .amp-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,.58);
      font-weight: 900;
      font-size: .68rem;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .amp-led {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent), 0 0 26px color-mix(in srgb, var(--accent) 70%, transparent);
    }

    .amp-main {
      position: relative;
      z-index: 1;
      align-self: center;
    }

    .amp-knobs {
      display: flex;
      gap: 9px;
      margin-bottom: 16px;
    }

    .amp-knobs span {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 33% 25%, rgba(255,255,255,.32), transparent 23%),
        radial-gradient(circle, #343434, #070707 70%);
      border: 1px solid rgba(255,255,255,.18);
      position: relative;
      box-shadow: inset 0 -8px 14px rgba(0,0,0,.62);
    }

    .amp-knobs span::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 5px;
      width: 2px;
      height: 9px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      transform: translateX(-50%) rotate(25deg);
    }

    .amp-btn h2 {
      margin: 0;
      font-family: 'Elektrix', Arial, sans-serif;
      color: var(--yellow);
      font-size: clamp(1.55rem, 3vw, 2.3rem);
      line-height: .92;
      text-shadow: 0 0 15px color-mix(in srgb, var(--accent) 38%, transparent), 3px 4px 0 rgba(0,0,0,.72);
    }

    .amp-btn p {
      margin: 10px 0 0;
      color: rgba(255,255,255,.68);
      font-size: .88rem;
      line-height: 1.35;
    }

    .amp-footer {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,.11);
      font-size: .7rem;
      font-weight: 900;
      color: rgba(255,255,255,.72);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .amp-footer strong {
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent);
    }

    #quiz-screen {
      align-content: start;
    }

    .quiz-shell {
      width: 100%;
      display: grid;
      gap: 14px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }

    .hud-card {
      min-height: 58px;
      padding: 10px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.56);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 16px 42px rgba(0,0,0,.32);
    }

    .hud-card span {
      display: block;
      color: rgba(255,255,255,.56);
      font-size: .67rem;
      letter-spacing: .13em;
      text-transform: uppercase;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .hud-card strong {
      color: var(--yellow);
      font-size: 1.2rem;
      font-family: 'Elektrix', Arial, sans-serif;
      line-height: 1;
    }

    .question-card {
      padding: clamp(15px, 3vw, 28px);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.16);
      background:
        radial-gradient(circle at 50% 0%, rgba(241,196,15,.13), transparent 52%),
        rgba(0,0,0,.66);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 28px 72px rgba(0,0,0,.52);
    }

    .quote {
      margin: 0 0 16px;
      color: rgba(255,255,255,.66);
      font-style: italic;
      font-size: .93rem;
      line-height: 1.45;
    }

    .question-title {
      margin: 0;
      font-family: 'Elektrix', Arial, sans-serif;
      color: #fff;
      font-size: clamp(1.65rem, 4vw, 3rem);
      line-height: 1.16;
      min-height: 2.4em;
      letter-spacing: .025em;
      text-shadow:
        0 0 12px rgba(255,255,255,.35),
        0 0 26px rgba(241,196,15,.42),
        0 0 46px rgba(241,196,15,.18);
      opacity: 0;
      transform: translateY(16px) scale(.985);
      filter: blur(6px);
    }

    .question-title.is-typing {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
      transition: opacity .55s ease, transform .55s ease, filter .55s ease;
    }

    .question-title::after {
      content: "";
      display: inline-block;
      width: .08em;
      height: .9em;
      margin-left: .12em;
      transform: translateY(.12em);
      background: rgba(241,196,15,.9);
      box-shadow: 0 0 14px rgba(241,196,15,.72);
      animation: cursorBlink .8s steps(2, start) infinite;
    }

    .question-title.done-typing::after { display: none; }

    @keyframes cursorBlink {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .answer-btn {
      min-height: 76px;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.18);
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
        rgba(0,0,0,.62);
      color: #fff;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease, background .22s ease, opacity .22s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 12px 30px rgba(0,0,0,.28);
      opacity: 0;
      transform: translateY(18px) scale(.98);
      animation: answerEntrance .52s ease forwards;
      animation-delay: var(--answer-delay, 0ms);
    }

    @keyframes answerEntrance {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      border-color: rgba(241,196,15,.55);
      box-shadow: 0 0 24px rgba(241,196,15,.16), 0 16px 36px rgba(0,0,0,.38);
    }

    .answer-btn.correct {
      background: rgba(46,204,113,.78);
      border-color: var(--easy);
      color: #fff;
      box-shadow: 0 0 26px rgba(46,204,113,.45), 0 0 52px rgba(46,204,113,.18);
      animation: correctPulse .78s ease both;
    }

    .answer-btn.wrong {
      background: rgba(231,76,60,.78);
      border-color: var(--red);
      color: #fff;
      box-shadow: 0 0 26px rgba(231,76,60,.42);
      animation: wrongShake .42s ease both;
    }

    .answer-btn.dimmed {
      opacity: .28 !important;
      filter: grayscale(.8);
    }

    .answer-btn:disabled { cursor: default; }

    @keyframes correctPulse {
      0% { transform: scale(1); }
      45% { transform: scale(1.035); }
      100% { transform: scale(1); }
    }

    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .feedback-card {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.46);
      color: rgba(255,255,255,.76);
      line-height: 1.5;
      text-align: left;
    }

    .feedback-card.show { display: block; }

    .feedback-card strong {
      display: block;
      color: var(--yellow);
      font-family: 'Elektrix', Arial, sans-serif;
      margin-bottom: 5px;
      font-size: 1.15rem;
    }

    .result-card {
      width: min(780px, 100%);
      margin: 0 auto;
      padding: clamp(18px, 4vw, 34px);
      border-radius: 30px;
      border: 1px solid rgba(241,196,15,.32);
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-align: center;
      box-shadow: 0 28px 78px rgba(0,0,0,.58), 0 0 44px rgba(241,196,15,.12);
    }

    .result-card h2 {
      margin: 0;
      color: var(--yellow);
      font-family: 'Elektrix', Arial, sans-serif;
      font-size: clamp(2rem, 5vw, 4rem);
      text-shadow: 0 0 22px rgba(241,196,15,.46);
    }

    .result-card p {
      color: rgba(255,255,255,.76);
      line-height: 1.5;
      font-size: 1.05rem;
    }

    .primary-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      background: var(--yellow);
      color: #060606;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 14px 34px rgba(241,196,15,.24);
      transition: .2s ease;
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .hidden { display: none !important; }

    @media (max-width: 760px) {
      body { background-attachment: scroll; }

      .topbar {
        top: 8px;
        min-height: 38px;
        padding: 5px 7px;
      }

      .top-title {
        font-size: .72rem;
        max-width: 42vw;
      }

      .top-btn {
        min-height: 28px;
        padding: 5px 8px;
        font-size: .68rem;
      }

      .screen {
        width: calc(100% - 14px);
        padding-top: 58px;
      }

      .amp-stage {
        min-height: calc(100svh - 80px);
        gap: 12px;
        padding: 6px;
      }

      .amp-heading {
        padding: 10px;
        border-radius: 18px;
      }

      .amp-heading small {
        font-size: .58rem;
        margin-bottom: 5px;
      }

      .amp-heading h1 {
        font-size: clamp(1.65rem, 10vw, 2.5rem);
      }

      .amp-heading p {
        display: none;
      }

      .difficulty-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .amp-btn {
        min-height: 122px;
        border-radius: 18px;
        padding: 10px;
        gap: 6px;
      }

      .amp-knobs {
        margin-bottom: 8px;
      }

      .amp-knobs span {
        width: 21px;
        height: 21px;
      }

      .amp-btn h2 {
        font-size: 1.45rem;
      }

      .amp-btn p {
        font-size: .78rem;
        margin-top: 6px;
      }

      .amp-footer {
        padding-top: 6px;
        font-size: .56rem;
      }

      .hud {
        grid-template-columns: repeat(2, 1fr);
      }

      .hud-card {
        min-height: 50px;
        border-radius: 13px;
      }

      .hud-card strong {
        font-size: 1rem;
      }

      .answers {
        grid-template-columns: 1fr;
        gap: 9px;
        margin-top: 14px;
      }

      .answer-btn {
        min-height: 58px;
        font-size: .9rem;
      }

      .question-card {
        border-radius: 20px;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <button class="top-btn" onclick="goHome()">← Menu principal</button>
    <div class="top-title">Modo Quiz</div>
    <div class="top-actions">
      <button id="fiftyBtn" class="top-btn" onclick="useFiftyFifty()" disabled>50/50</button>
      <button id="skipBtn" class="top-btn" onclick="skipQuestion()" disabled>Pular</button>
    </div>
  </header>

  <main id="difficulty-screen" class="screen active">
    <section class="amp-stage">
      <div class="amp-heading">
        <small>Canal do Quiz</small>
        <h1>Escolha a Dificuldade</h1>
        <p>Selecione o nível e entre direto na primeira pergunta. Nada de menu duplicado, nada de camada fantasma.</p>
      </div>

      <div class="difficulty-grid">
        <button class="amp-btn easy" onclick="startQuiz('facil', this)">
          <div class="amp-top"><span>Aquecimento</span><i class="amp-led"></i></div>
          <div class="amp-main">
            <div class="amp-knobs"><span></span><span></span><span></span></div>
            <h2>Fácil</h2>
            <p>Começo leve para entrar no clima CBJR.</p>
          </div>
          <div class="amp-footer"><span>Gain baixo</span><strong>Start</strong></div>
        </button>

        <button class="amp-btn normal" onclick="startQuiz('normal', this)">
          <div class="amp-top"><span>Na atividade</span><i class="amp-led"></i></div>
          <div class="amp-main">
            <div class="amp-knobs"><span></span><span></span><span></span></div>
            <h2>Normal</h2>
            <p>Equilíbrio entre memória, história e clássicos.</p>
          </div>
          <div class="amp-footer"><span>Volume médio</span><strong>Start</strong></div>
        </button>

        <button class="amp-btn hard" onclick="startQuiz('dificil', this)">
          <div class="amp-top"><span>Distorção</span><i class="amp-led"></i></div>
          <div class="amp-main">
            <div class="amp-knobs"><span></span><span></span><span></span></div>
            <h2>Difícil</h2>
            <p>Modo sem perdão para quem conhece de verdade.</p>
          </div>
          <div class="amp-footer"><span>Gain no talo</span><strong>Start</strong></div>
        </button>
      </div>
    </section>
  </main>

  <main id="quiz-screen" class="screen">
    <section class="quiz-shell" id="quiz-content">
      <div class="hud">
        <div class="hud-card"><span>Pergunta</span><strong id="progressText">0/0</strong></div>
        <div class="hud-card"><span>Pontos</span><strong id="scoreText">0</strong></div>
        <div class="hud-card"><span>Acertos</span><strong id="correctText">0</strong></div>
        <div class="hud-card"><span>Nível</span><strong id="levelText">Normal</strong></div>
      </div>

      <article class="question-card">
        <p class="quote" id="quoteText"></p>
        <h2 class="question-title" id="questionText">Carregando...</h2>
        <div class="answers" id="answers"></div>
        <div class="feedback-card" id="feedback"></div>
      </article>
    </section>
  </main>

  <main id="result-screen" class="screen">
    <section class="result-card">
      <h2 id="resultTitle">Resultado</h2>
      <p id="resultText"></p>
      <button class="primary-btn" onclick="resetQuiz()">Jogar novamente</button>
    </section>
  </main>

  <script>
    const DATA_URL = 'perguntas.json';

    let allGroups = [];
    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let correct = 0;
    let selectedDifficulty = 'normal';
    let fiftyUsed = false;
    let skipUsed = false;
    let locked = false;

    const difficultyConfig = {
      facil: { label: 'Fácil', points: 10, limit: 10 },
      normal: { label: 'Normal', points: 15, limit: 15 },
      dificil: { label: 'Difícil', points: 20, limit: 25 }
    };

    const el = (id) => document.getElementById(id);

    document.addEventListener('DOMContentLoaded', async () => {
      await loadQuestions();
    });

    async function loadQuestions() {
      try {
        const response = await fetch(DATA_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error('Não foi possível carregar perguntas.json');
        allGroups = await response.json();

        if (!Array.isArray(allGroups) || !allGroups.length) {
          throw new Error('perguntas.json está vazio ou fora do padrão esperado.');
        }
      } catch (error) {
        el('questionText').textContent = 'Erro ao carregar perguntas.';
        console.error(error);
        alert('Erro ao carregar perguntas.json. Confira se o arquivo está na raiz do GitHub junto com quiz.html.');
      }
    }

    function normalizeQuestions(groups) {
      return groups.flatMap((group, groupIndex) => {
        const frase = group.fraseChorao || '';
        const perguntas = Array.isArray(group.perguntas) ? group.perguntas : [];
        return perguntas.map((q, qIndex) => ({
          id: `${groupIndex}-${qIndex}`,
          fraseChorao: frase,
          pergunta: cleanText(q.pergunta || ''),
          respostas: Array.isArray(q.respostas) ? q.respostas.map(cleanText) : [],
          correta: cleanText(q.correta || ''),
          curiosidade: cleanText(q.curiosidade || '')
        }));
      }).filter(q => q.pergunta && q.respostas.length && q.correta);
    }

    function cleanText(value) {
      return String(value)
        .replace(/<\s*br\s*\/?>/gi, '<br>')
        .replace(/\s+/g, ' ')
        .replace(/\s*<br>\s*/gi, '<br>')
        .replace(/\s+([?.!,;:])/g, '$1')
        .trim();
    }

    function stripHTML(value) {
      return String(value).replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    }

    function cinematicQuestion(text) {
      const target = el('questionText');
      target.innerHTML = '';
      target.classList.remove('is-typing', 'done-typing');

      const source = cleanText(text);
      const tokens = source.match(/<br>|[^<]/gi) || [];
      let index = 0;

      requestAnimationFrame(() => target.classList.add('is-typing'));

      function typeNext() {
        if (index >= tokens.length) {
          target.classList.add('done-typing');
          return;
        }

        const token = tokens[index];
        target.innerHTML += token.toLowerCase() === '<br>' ? '<br>' : token;
        index++;
        setTimeout(typeNext, token.toLowerCase() === '<br>' ? 110 : 18);
      }

      typeNext();
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startQuiz(difficulty, button) {
      if (!allGroups.length) {
        alert('As perguntas ainda não carregaram. Aguarde um instante e tente novamente.');
        return;
      }

      selectedDifficulty = difficulty;
      const config = difficultyConfig[difficulty] || difficultyConfig.normal;

      if (button) {
        button.classList.add('loading');
        setTimeout(() => button.classList.remove('loading'), 260);
      }

      const normalized = normalizeQuestions(allGroups);
      quizQuestions = shuffle(normalized).slice(0, Math.min(config.limit, normalized.length));
      currentIndex = 0;
      score = 0;
      correct = 0;
      fiftyUsed = false;
      skipUsed = false;
      locked = false;

      el('levelText').textContent = config.label;
      el('fiftyBtn').disabled = false;
      el('skipBtn').disabled = false;

      showScreen('quiz-screen');
      renderQuestion();
    }

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.toggle('active', screen.id === screenId);
      });
    }

    function renderQuestion() {
      locked = false;
      const question = quizQuestions[currentIndex];

      if (!question) {
        showResult();
        return;
      }

      el('progressText').textContent = `${currentIndex + 1}/${quizQuestions.length}`;
      el('scoreText').textContent = score;
      el('correctText').textContent = correct;
      el('quoteText').textContent = question.fraseChorao ? `“${question.fraseChorao}”` : '';
      cinematicQuestion(question.pergunta);

      const answers = el('answers');
      answers.innerHTML = '';
      el('feedback').classList.remove('show');
      el('feedback').innerHTML = '';

      shuffle(question.respostas).forEach((answer, idx) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.style.setProperty('--answer-delay', `${260 + idx * 120}ms`);
        btn.textContent = stripHTML(answer);
        btn.onclick = () => answerQuestion(answer, btn);
        answers.appendChild(btn);
      });
    }

    function answerQuestion(answer, selectedBtn) {
      if (locked) return;
      locked = true;

      const question = quizQuestions[currentIndex];
      const isCorrect = cleanText(answer) === cleanText(question.correta);
      const buttons = [...document.querySelectorAll('.answer-btn')];

      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn !== selectedBtn) btn.classList.add('dimmed');
      });

      if (isCorrect) {
        selectedBtn.classList.add('correct');
        correct++;
        score += difficultyConfig[selectedDifficulty].points;
      } else {
        selectedBtn.classList.add('wrong');
      }

      el('scoreText').textContent = score;
      el('correctText').textContent = correct;

      const feedback = el('feedback');
      if (isCorrect) {
        feedback.innerHTML = `
          <strong>Boa! Resposta certa.</strong>
          ${question.curiosidade || 'Sem curiosidade cadastrada para esta pergunta.'}
        `;
        feedback.classList.add('show');
      } else {
        feedback.innerHTML = `
          <strong>Não foi dessa vez.</strong>
          A resposta correta não será revelada agora. Continue no jogo e tente recuperar na próxima.
        `;
        feedback.classList.add('show');
      }

      setTimeout(() => {
        currentIndex++;
        renderQuestion();
      }, isCorrect ? 2500 : 1900);
    }

    function useFiftyFifty() {
      if (fiftyUsed || locked || !quizQuestions[currentIndex]) return;
      fiftyUsed = true;
      el('fiftyBtn').disabled = true;

      const question = quizQuestions[currentIndex];
      const wrongButtons = [...document.querySelectorAll('.answer-btn')]
        .filter(btn => cleanText(btn.textContent) !== cleanText(question.correta));

      shuffle(wrongButtons).slice(0, 2).forEach(btn => {
        btn.disabled = true;
        btn.style.opacity = '.22';
        btn.style.pointerEvents = 'none';
      });
    }

    function skipQuestion() {
      if (skipUsed || locked || !quizQuestions[currentIndex]) return;
      skipUsed = true;
      el('skipBtn').disabled = true;
      currentIndex++;
      renderQuestion();
    }

    function showResult() {
      el('fiftyBtn').disabled = true;
      el('skipBtn').disabled = true;

      const total = quizQuestions.length;
      const percent = total ? Math.round((correct / total) * 100) : 0;

      let title = 'Fim do Quiz';
      if (percent >= 90) title = 'Respeita o corre!';
      else if (percent >= 70) title = 'Mandou bem!';
      else if (percent >= 45) title = 'Tá no caminho!';
      else title = 'Bora tentar de novo!';

      el('resultTitle').textContent = title;
      el('resultText').innerHTML = `
        Você acertou <strong>${correct}</strong> de <strong>${total}</strong> perguntas.<br>
        Pontuação final: <strong>${score}</strong> pontos.<br>
        Aproveitamento: <strong>${percent}%</strong>.
      `;

      showScreen('result-screen');
    }

    function resetQuiz() {
      showScreen('difficulty-screen');
      el('fiftyBtn').disabled = true;
      el('skipBtn').disabled = true;
    }

    function goHome() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
