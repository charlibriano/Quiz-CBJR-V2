<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modo Quiz - CBJR</title>
<link rel="preconnect" href="https://raw.githubusercontent.com" />
<style>
@font-face {
  font-family: 'Elektrix';
  src: url('https://raw.githubusercontent.com/charlibriano/Quiz-CBJR-V2/main/Elektrix-Bold.woff2') format('woff2'),
       url('https://raw.githubusercontent.com/charlibriano/Quiz-CBJR-V2/main/Elektrix-Bold.woff') format('woff'),
       url('https://cdn.jsdelivr.net/gh/charlibriano/Quiz-CBJR-V2/Elektrix%20Bold.ttf') format('truetype');
  font-weight: bold;
  font-display: swap;
}
:root {
  --yellow:#f1c40f; --green:#1ed760; --red:#ff3838; --dark:#050505; --card:rgba(0,0,0,.72); --line:rgba(241,196,15,.42);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#020202;color:#fff;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}
body{
  background:
    linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.82)),
    url('quiz-bg.jpg') center center / cover no-repeat fixed,
    #020202;
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 35%,rgba(241,196,15,.10),transparent 38%),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px);background-size:auto,44px 44px,44px 44px;opacity:.55}
.topbar{position:relative;z-index:10;width:min(1180px,calc(100% - 28px));margin:14px auto 0;display:flex;align-items:center;justify-content:space-between;gap:12px}
.back-btn,.utility-btn{border:1px solid var(--yellow);background:rgba(0,0,0,.62);color:var(--yellow);border-radius:999px;padding:12px 20px;font-weight:900;text-decoration:none;box-shadow:0 0 22px rgba(241,196,15,.18);cursor:pointer}
.utilities{display:flex;gap:10px;align-items:center}
.utility-btn{padding:10px 16px;font-size:.88rem;display:none}
body.playing .utility-btn{display:inline-flex}
.utility-btn:disabled{opacity:.35;cursor:not-allowed}
.app{position:relative;z-index:2;width:min(1180px,calc(100% - 24px));margin:16px auto 28px;min-height:calc(100svh - 105px)}
.screen{display:none}.screen.active{display:block}
/* Tela dificuldade limpa: uma única camada */
#difficulty-screen{min-height:calc(100svh - 115px);align-content:center}
.amp-panel{position:relative;margin:0 auto;width:min(1120px,100%);aspect-ratio:16/9;border-radius:30px;overflow:hidden;background:url('quiz-bg.jpg') center center / cover no-repeat,linear-gradient(145deg,#0a0a0a,#000);box-shadow:0 28px 90px rgba(0,0,0,.72),0 0 0 1px rgba(241,196,15,.20)}
.amp-panel::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.16));pointer-events:none}
.hotspot{position:absolute;bottom:5.6%;height:35%;border-radius:22px;border:2px solid transparent;background:rgba(0,0,0,.02);cursor:pointer;z-index:3;transition:.22s ease;display:flex;align-items:flex-end;justify-content:center;padding-bottom:1.8%}
.hotspot span{display:block;min-width:62%;padding:12px 18px;border-radius:14px;background:rgba(0,0,0,.40);font-weight:950;letter-spacing:.04em;text-transform:uppercase;box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
.hotspot.easy{left:4.8%;width:27.6%;color:#7dff38}.hotspot.normal{left:36.3%;width:27.5%;color:var(--yellow)}.hotspot.hard{left:67.8%;width:27.6%;color:var(--red)}
.hotspot:hover,.hotspot.selected{background:rgba(255,255,255,.08);transform:translateY(-4px);border-color:currentColor;box-shadow:0 0 32px currentColor}
.fallback-title{display:none}
/* Quiz */
.quiz-shell{width:min(980px,100%);margin:0 auto;padding:18px;border:1px solid rgba(241,196,15,.38);border-radius:28px;background:linear-gradient(180deg,rgba(0,0,0,.75),rgba(0,0,0,.88));box-shadow:0 26px 80px rgba(0,0,0,.70), inset 0 1px 0 rgba(255,255,255,.10)}
.quiz-head{display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid rgba(255,255,255,.14);padding:0 4px 14px;margin-bottom:16px}
.quiz-title{font-family:'Elektrix',Arial,sans-serif;color:var(--yellow);font-size:clamp(1.5rem,4vw,2.4rem);text-shadow:0 0 18px rgba(241,196,15,.45);margin:0}
.quiz-meta{font-weight:900;color:rgba(255,255,255,.72);font-size:.9rem;text-align:right}
.question-card{border-radius:24px;padding:clamp(18px,4vw,34px);background:radial-gradient(circle at 50% 0%,rgba(241,196,15,.10),transparent 42%),rgba(0,0,0,.72);box-shadow:inset 0 0 30px rgba(241,196,15,.09)}
.question-text{font-family:'Elektrix',Arial,sans-serif;font-size:clamp(1.75rem,5.6vw,3.4rem);line-height:1.28;text-align:center;color:#fff;text-shadow:0 0 16px rgba(255,255,255,.75),0 0 24px rgba(241,196,15,.35);margin:4px 0 26px}
.answers{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.answer{position:relative;min-height:78px;border-radius:16px;border:2px solid rgba(255,255,255,.22);background:linear-gradient(145deg,rgba(38,36,77,.94),rgba(18,18,46,.94));color:#fff;font-size:1.05rem;font-weight:800;cursor:pointer;box-shadow:0 10px 26px rgba(0,0,0,.42);transition:.18s ease;padding:16px 18px}
.answer small{position:absolute;left:14px;top:10px;color:rgba(255,255,255,.45)}
.answer:hover:not(:disabled){transform:translateY(-3px);border-color:rgba(241,196,15,.75);box-shadow:0 0 24px rgba(241,196,15,.22)}
.answer.correct{background:linear-gradient(145deg,rgba(30,215,96,.96),rgba(9,105,45,.96));border-color:var(--green)}
.answer.incorrect{background:linear-gradient(145deg,rgba(255,56,56,.96),rgba(110,12,12,.96));border-color:var(--red)}
.answer:disabled{cursor:not-allowed}
.curiosity{display:none;margin-top:18px;padding:16px;border-radius:16px;border:1px solid rgba(241,196,15,.28);background:rgba(0,0,0,.58);line-height:1.55;color:rgba(255,255,255,.84)}
.curiosity.show{display:block}
.next-row{display:none;justify-content:center;margin-top:18px}.next-row.show{display:flex}
.next-btn{border:0;border-radius:999px;background:var(--yellow);color:#060606;font-weight:950;padding:13px 28px;cursor:pointer;box-shadow:0 14px 30px rgba(241,196,15,.18)}
.result{text-align:center;padding:26px}.result h2{font-family:'Elektrix';color:var(--yellow);font-size:2.4rem}.result p{font-size:1.1rem;color:rgba(255,255,255,.8)}
.footer-stats{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.14);margin-top:18px;padding-top:14px;font-weight:900;color:rgba(255,255,255,.72)}
@media(max-width:760px){
  .topbar{width:calc(100% - 18px);margin-top:10px}.back-btn{padding:10px 14px;font-size:.88rem}.utilities{gap:6px}.utility-btn{padding:8px 10px;font-size:.74rem}
  .app{width:calc(100% - 16px);margin-top:10px}
  #difficulty-screen{min-height:calc(100svh - 92px)}
  .amp-panel{aspect-ratio:9/14;border-radius:22px;background-size:cover;background-position:center}
  .amp-panel::before{content:"Modo Quiz\A Escolha a dificuldade";white-space:pre;position:absolute;top:6%;left:50%;transform:translateX(-50%);z-index:4;text-align:center;font-family:'Elektrix';color:var(--yellow);font-size:clamp(1.6rem,8vw,2.5rem);line-height:1.15;text-shadow:0 0 18px rgba(241,196,15,.6)}
  .hotspot{left:8%!important;width:84%!important;height:15%;padding-bottom:0;align-items:center;background:rgba(0,0,0,.52);border-color:currentColor;backdrop-filter:blur(4px)}
  .hotspot.easy{top:31%;bottom:auto}.hotspot.normal{top:50%;bottom:auto}.hotspot.hard{top:69%;bottom:auto}
  .hotspot span{min-width:70%;text-align:center}
  .quiz-shell{padding:10px;border-radius:22px}.quiz-head{align-items:flex-start}.quiz-meta{font-size:.75rem}
  .question-card{padding:18px 12px;border-radius:18px}.answers{grid-template-columns:1fr;gap:10px}.answer{min-height:64px;font-size:.95rem}
}
</style>
</head>
<body>
<header class="topbar">
  <a class="back-btn" href="index.html">← Menu principal</a>
  <div class="utilities">
    <button id="btn5050" class="utility-btn" type="button">50/50 <b id="count5050">1</b></button>
    <button id="btnSkip" class="utility-btn" type="button">Pular <b id="countSkip">1</b></button>
  </div>
</header>
<main class="app">
  <section id="difficulty-screen" class="screen active" aria-label="Escolha a dificuldade">
    <div class="amp-panel">
      <button class="hotspot easy" data-difficulty="easy" type="button"><span>Tocar agora</span></button>
      <button class="hotspot normal" data-difficulty="normal" type="button"><span>Ligar guitarra</span></button>
      <button class="hotspot hard" data-difficulty="hard" type="button"><span>Destruir tudo</span></button>
    </div>
  </section>
  <section id="quiz-screen" class="screen" aria-label="Quiz">
    <div class="quiz-shell">
      <div class="quiz-head">
        <h1 class="quiz-title">Modo Quiz</h1>
        <div class="quiz-meta" id="quizMeta">Carregando...</div>
      </div>
      <div id="quizArea"></div>
      <div class="footer-stats" id="footerStats"></div>
    </div>
  </section>
</main>

let questionsByLevel = [];
let state = { difficulty:'normal', level:0, index:0, score:0, answered:false, currentQuestions:[], used5050:false, usedSkip:false };
const difficultyConfig = {
  easy: { label:'Fácil', perLevel:3, points:10 },
  normal: { label:'Normal', perLevel:5, points:15 },
  hard: { label:'Difícil', perLevel:5, points:25 }
};
const $ = id => document.getElementById(id);
function stripHtml(txt) { return String(txt || '').replace(/<br\s*\/?>/gi,' '); }
async function loadQuestions() {
  try {
    const res = await fetch('perguntas.json', { cache:'no-store' });
    if (!res.ok) throw new Error('JSON não encontrado');
    questionsByLevel = await res.json();
  } catch(e) {
    questionsByLevel = QUESTIONS_FALLBACK;
  }
}
function shuffle(arr) { return [...arr].sort(() => Math.random() - .5); }
function startQuiz(difficulty) {
  state = { difficulty, level:0, index:0, score:0, answered:false, currentQuestions:[], used5050:false, usedSkip:false };
  document.body.classList.add('playing');
  $('difficulty-screen').classList.remove('active');
  $('quiz-screen').classList.add('active');
  $('count5050').textContent = '1'; $('countSkip').textContent = '1';
  prepareLevel();
}
function prepareLevel() {
  const all = questionsByLevel[state.level]?.perguntas || [];
  const max = difficultyConfig[state.difficulty].perLevel;
  state.currentQuestions = shuffle(all).slice(0, Math.min(max, all.length));
  state.index = 0;
  showQuestion();
}
function showQuestion() {
  state.answered = false;
  const q = state.currentQuestions[state.index];
  if (!q) return nextLevelOrFinish();
  const answers = shuffle(q.respostas || []);
  $('quizMeta').innerHTML = `${difficultyConfig[state.difficulty].label} • Nível ${state.level+1}/${questionsByLevel.length}`;
  $('footerStats').innerHTML = `<span>Pergunta: ${state.index+1}/${state.currentQuestions.length}</span><span>Pontos: ${state.score}</span><span>Recorde: ${localStorage.getItem('cbjrQuizRecord') || 0}</span>`;
  $('quizArea').innerHTML = `
    <div class="question-card">
      <div class="question-text">${q.pergunta}</div>
      <div class="answers">${answers.map((a,i)=>`<button class="answer" data-answer="${encodeURIComponent(a)}"><small>${i+1}</small>${a}</button>`).join('')}</div>
      <div id="curiosity" class="curiosity"></div>
      <div id="nextRow" class="next-row"><button class="next-btn" type="button">Próxima pergunta</button></div>
    </div>`;
  document.querySelectorAll('.answer').forEach(btn => btn.addEventListener('click', () => answerQuestion(decodeURIComponent(btn.dataset.answer), btn)));
  document.querySelector('.next-btn').addEventListener('click', () => { state.index++; showQuestion(); });
}
function answerQuestion(answer, btn) {
  if (state.answered) return;
  state.answered = true;
  const q = state.currentQuestions[state.index];
  const correct = answer === q.correta;
  document.querySelectorAll('.answer').forEach(b => {
    const val = decodeURIComponent(b.dataset.answer);
    b.disabled = true;
    if (val === q.correta) b.classList.add('correct');
  });
  if (!correct) btn.classList.add('incorrect');
  if (correct) state.score += difficultyConfig[state.difficulty].points;
  const curiosity = $('curiosity');
  curiosity.classList.add('show');
  curiosity.innerHTML = `<strong>${correct ? 'Acertou!' : 'Quase!'}</strong><br>${q.curiosidade || ''}`;
  $('nextRow').classList.add('show');
  $('footerStats').innerHTML = `<span>Pergunta: ${state.index+1}/${state.currentQuestions.length}</span><span>Pontos: ${state.score}</span><span>Recorde: ${localStorage.getItem('cbjrQuizRecord') || 0}</span>`;
}
function nextLevelOrFinish() {
  if (state.level < questionsByLevel.length - 1) { state.level++; prepareLevel(); return; }
  const old = Number(localStorage.getItem('cbjrQuizRecord') || 0);
  if (state.score > old) localStorage.setItem('cbjrQuizRecord', state.score);
  $('quizArea').innerHTML = `<div class="result"><h2>Fim de jogo!</h2><p>Você terminou no modo <strong>${difficultyConfig[state.difficulty].label}</strong> com <strong>${state.score}</strong> pontos.</p><button class="next-btn" onclick="location.reload()">Jogar de novo</button></div>`;
  $('footerStats').innerHTML = `<span>Pontos finais: ${state.score}</span><span>Recorde: ${localStorage.getItem('cbjrQuizRecord')}</span>`;
}
function use5050() {
  if (state.used5050 || state.answered) return;
  const q = state.currentQuestions[state.index];
  const wrong = [...document.querySelectorAll('.answer')].filter(b => decodeURIComponent(b.dataset.answer) !== q.correta);
  shuffle(wrong).slice(0,2).forEach(b => { b.disabled = true; b.style.opacity = '.22'; });
  state.used5050 = true; $('btn5050').disabled = true; $('count5050').textContent = '0';
}
function skipQuestion() {
  if (state.usedSkip || state.answered) return;
  state.usedSkip = true; $('btnSkip').disabled = true; $('countSkip').textContent = '0';
  state.index++; showQuestion();
}
window.addEventListener('DOMContentLoaded', async () => {
  await loadQuestions();
  document.querySelectorAll('.hotspot').forEach(btn => btn.addEventListener('click', () => {
    btn.classList.add('selected');
    setTimeout(() => startQuiz(btn.dataset.difficulty), 180);
  }));
  $('btn5050').addEventListener('click', use5050);
  $('btnSkip').addEventListener('click', skipQuestion);
});
</script>
